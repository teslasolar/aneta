<script>
// ======== DATA ========
const NUM_STR = "31736846399216804645406807161448227806067941438500";
const DIGITS = NUM_STR.split('').map(Number);
const PRIMES = [2, 3, 5, 7, 11, 13, 17];
const EXPONENTS = [2, 8, 3, 7, 15, 6, 12];
const COLORS = ['#604','#0ad','#fa0','#f44','#4a4','#a4f','#fff'];
const CRGB = [[102,0,68],[0,170,221],[255,170,0],[255,68,68],[68,170,68],[170,68,255],[255,255,255]];
const MAX_EXP = 15;
const BINARY = (() => {
  let n = BigInt(NUM_STR);
  let b = n.toString(2);
  while(b.length < 165) b = '0'+b;
  return b;
})();
const PRIME_POWERS = ["4","6561","125","823543","4177248169415651","4826809","582622237229761"];
const MODE_NAMES = ['7-PILLAR FACTORIZATION','RADIAL PRIME ORBITS','HEXAGONAL DIGIT GRID','PRIME CONSTELLATION','DIGIT MATRIX','BINARY WAVEFORM'];

// ======== CANVAS SETUP ========
const C = document.getElementById('main');
const ctx = C.getContext('2d');
let W, H, cx, cy;
function resize(){
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// ======== STATE ========
let currentMode = 0;
let targetMode = 0;
let transitionT = 1; // 0..1, 1 = fully arrived
let transitionDir = 1;
const TRANS_SPEED = 0.025;
let autoTimer = 0;
const AUTO_INTERVAL = 720; // ~12s at 60fps
let selectedPillar = -1;
let mouseX = 0, mouseY = 0;

// ======== POINTS: each view mode defines 50 point positions ========
// Points represent the 50 digits
let points = [];
for(let i=0;i<50;i++){
  points.push({
    x:cx, y:cy, tx:cx, ty:cy, // current + target
    sx:cx, sy:cy, // source (for transition)
    r:4, tr:4, sr:4,
    color: COLORS[i%7],
    digit: DIGITS[i],
    alpha: 1
  });
}

// Extra geometry points for decorations per mode
let geoLines = []; // {x1,y1,x2,y2,color,alpha}
let geoCircles = []; // {x,y,r,color,alpha}
let geoTargetLines = [];
let geoTargetCircles = [];
let geoSourceLines = [];
let geoSourceCircles = [];

// ======== LAYOUT FUNCTIONS ========
function getViewArea(){
  const top = 155;
  const bottom = H - 60;
  const left = 30;
  const right = W - 30;
  return {top, bottom, left, right, w: right-left, h: bottom-top, cx: (left+right)/2, cy: (top+bottom)/2};
}

// MODE 0: PILLARS
function layoutPillars(){
  const v = getViewArea();
  const gap = 14;
  const pw = Math.min(60, Math.floor((v.w - gap*8) / 7));
  const maxH = v.h * 0.75;
  const baseY = v.cy + v.h*0.35;
  const lines = [], circles = [];

  // Assign digits to pillars based on index
  let di = 0;
  for(let pi=0;pi<7;pi++){
    const px = v.cx - (3.5*pw + 3*gap) + pi*(pw+gap) + pw/2;
    const pillarH = (EXPONENTS[pi]/MAX_EXP) * maxH;
    const topY = baseY - pillarH;

    // Pillar outline
    lines.push({x1:px-pw/2,y1:baseY,x2:px-pw/2,y2:topY,color:COLORS[pi],alpha:0.6});
    lines.push({x1:px+pw/2,y1:baseY,x2:px+pw/2,y2:topY,color:COLORS[pi],alpha:0.6});
    lines.push({x1:px-pw/2,y1:topY,x2:px+pw/2,y2:topY,color:COLORS[pi],alpha:0.6});

    // Horizontal exp lines
    for(let e=0;e<EXPONENTS[pi];e++){
      const ly = topY + (pillarH/(EXPONENTS[pi]+1))*(e+1);
      lines.push({x1:px-pw/2+3,y1:ly,x2:px+pw/2-3,y2:ly,color:COLORS[pi],alpha:0.15});
    }

    // Place digits vertically in pillar
    const digitsForPillar = Math.ceil(50/7);
    for(let d=0;d<digitsForPillar && di<50;d++,di++){
      const row = d;
      const py = topY + 15 + row * Math.min(22, (pillarH-20)/digitsForPillar);
      points[di].tx = px;
      points[di].ty = py;
      points[di].tr = Math.max(3, pw/5);
      points[di].color = COLORS[pi];
    }
  }
  // base line
  lines.push({x1:v.left,y1:baseY,x2:v.right,y2:baseY,color:'#0ad',alpha:0.15});
  return {lines, circles};
}

// MODE 1: RADIAL
function layoutRadial(){
  const v = getViewArea();
  const maxR = Math.min(v.w, v.h) * 0.42;
  const lines = [], circles = [];

  for(let pi=0;pi<7;pi++){
    const ringR = maxR * (0.15 + 0.85*(pi/6));
    circles.push({x:v.cx, y:v.cy, r:ringR, color:COLORS[pi], alpha:0.2});
  }

  // Place digits on rings
  let di = 0;
  for(let pi=0;pi<7;pi++){
    const ringR = maxR * (0.15 + 0.85*(pi/6));
    const count = Math.ceil(50/7);
    for(let d=0;d<count && di<50;d++,di++){
      const angle = (d/count) * Math.PI*2 - Math.PI/2;
      points[di].tx = v.cx + Math.cos(angle)*ringR;
      points[di].ty = v.cy + Math.sin(angle)*ringR;
      points[di].tr = 4 + (EXPONENTS[pi]/MAX_EXP)*4;
      points[di].color = COLORS[pi];
    }
  }

  // Radial spokes
  for(let i=0;i<7;i++){
    const angle = (i/7)*Math.PI*2 - Math.PI/2;
    lines.push({
      x1:v.cx, y1:v.cy,
      x2:v.cx+Math.cos(angle)*maxR, y2:v.cy+Math.sin(angle)*maxR,
      color:COLORS[i], alpha:0.08
    });
  }
  // Center marker
  circles.push({x:v.cx, y:v.cy, r:4, color:'#fc0', alpha:0.8});
  return {lines, circles};
}

// MODE 2: HEXGRID
function layoutHexGrid(){
  const v = getViewArea();
  const cols = 10, rows = 5;
  const hexR = Math.min(v.w/(cols*1.9), v.h/(rows*1.8));
  const lines = [], circles = [];
  const startX = v.cx - (cols-1)*hexR*0.87;
  const startY = v.cy - (rows-1)*hexR*0.85;

  let di = 0;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols && di<50;col++,di++){
      const offset = (row%2)*hexR*0.87;
      const px = startX + col*hexR*1.74 + offset;
      const py = startY + row*hexR*1.7;

      points[di].tx = px;
      points[di].ty = py;
      points[di].tr = hexR*0.55;

      // Color by digit value mapping to prime
      const d = DIGITS[di];
      points[di].color = COLORS[d % 7];

      // Hex outline
      for(let h=0;h<6;h++){
        const a1 = (h/6)*Math.PI*2 - Math.PI/6;
        const a2 = ((h+1)/6)*Math.PI*2 - Math.PI/6;
        lines.push({
          x1: px+Math.cos(a1)*hexR*0.75, y1: py+Math.sin(a1)*hexR*0.75,
          x2: px+Math.cos(a2)*hexR*0.75, y2: py+Math.sin(a2)*hexR*0.75,
          color: COLORS[d%7], alpha: 0.15
        });
      }
    }
  }
  return {lines, circles};
}

// MODE 3: CONSTELLATION
function layoutConstellation(){
  const v = getViewArea();
  const lines = [], circles = [];

  // Place digits in a scattered but structured pattern using golden angle
  const golden = Math.PI*(3-Math.sqrt(5));
  const maxR = Math.min(v.w, v.h)*0.4;

  for(let i=0;i<50;i++){
    const r = maxR * Math.sqrt((i+1)/51);
    const angle = i * golden;
    points[i].tx = v.cx + Math.cos(angle)*r;
    points[i].ty = v.cy + Math.sin(angle)*r;
    points[i].tr = 3 + DIGITS[i]*0.5;
    points[i].color = COLORS[i%7];
  }

  // Connect digits that share prime factors
  for(let i=0;i<50;i++){
    for(let j=i+1;j<50;j++){
      // Connect if digit values share a factor or are adjacent
      if(Math.abs(i-j) === 1 || (DIGITS[i]+DIGITS[j])%7 === 0){
        lines.push({
          x1:points[i].tx, y1:points[i].ty,
          x2:points[j].tx, y2:points[j].ty,
          color: COLORS[(i+j)%7], alpha:0.06
        });
      }
    }
  }
  // Brighter connections for 7-multiples
  for(let i=0;i<50;i+=7){
    for(let j=i+7;j<50;j+=7){
      lines.push({
        x1:points[i].tx, y1:points[i].ty,
        x2:points[j].tx, y2:points[j].ty,
        color: '#fc0', alpha:0.15
      });
    }
  }
  return {lines, circles};
}

// MODE 4: MATRIX
function layoutMatrix(){
  const v = getViewArea();
  const cols = 10, rows = 5;
  const cellW = Math.min(v.w*0.08, 50);
  const cellH = Math.min(v.h*0.14, 50);
  const lines = [], circles = [];

  const gridW = cols*cellW;
  const gridH = rows*cellH;
  const ox = v.cx - gridW/2 + cellW/2;
  const oy = v.cy - gridH/2 + cellH/2;

  let di=0;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols && di<50;col++,di++){
      points[di].tx = ox + col*cellW;
      points[di].ty = oy + row*cellH;
      points[di].tr = Math.min(cellW, cellH)*0.35;
      // Color by binary: every 3rd digit gets special
      points[di].color = BINARY[di*3 % 165]==='1' ? '#0ad' : COLORS[di%7];
    }
  }

  // Grid lines
  for(let row=0;row<=rows;row++){
    const y = v.cy - gridH/2 + row*cellH;
    lines.push({x1:v.cx-gridW/2, y1:y, x2:v.cx+gridW/2, y2:y, color:'#0ad', alpha:0.06});
  }
  for(let col=0;col<=cols;col++){
    const x = v.cx - gridW/2 + col*cellW;
    lines.push({x1:x, y1:v.cy-gridH/2, x2:x, y2:v.cy+gridH/2, color:'#0ad', alpha:0.06});
  }

  // Diagonal highlight for 7-row
  for(let i=0;i<Math.min(rows,cols);i++){
    const idx = i*cols+i;
    if(idx<50){
      circles.push({x:ox+i*cellW, y:oy+i*cellH, r:Math.min(cellW,cellH)*0.5, color:'#fc0', alpha:0.08});
    }
  }
  return {lines, circles};
}

// MODE 5: WAVEFORM
function layoutWaveform(){
  const v = getViewArea();
  const lines = [], circles = [];
  const margin = 40;

  // Place digits along a multi-frequency waveform
  for(let i=0;i<50;i++){
    const t = i/49;
    const x = v.left + margin + t*(v.w - margin*2);

    // Composite waveform from all 7 primes
    let y = 0;
    for(let pi=0;pi<7;pi++){
      const freq = PRIMES[pi];
      const amp = EXPONENTS[pi]/MAX_EXP;
      y += Math.sin(t*freq*1.2 + pi*0.5) * amp;
    }
    y = v.cy + y * v.h * 0.12;

    points[i].tx = x;
    points[i].ty = y;
    points[i].tr = 3 + DIGITS[i]*0.4;
    points[i].color = COLORS[i%7];
  }

  // Wave guide lines per prime
  for(let pi=0;pi<7;pi++){
    const steps = 100;
    for(let s=0;s<steps;s++){
      const t1 = s/steps;
      const t2 = (s+1)/steps;
      const x1 = v.left + margin + t1*(v.w-margin*2);
      const x2 = v.left + margin + t2*(v.w-margin*2);
      let y1=0, y2=0;
      const freq = PRIMES[pi];
      const amp = EXPONENTS[pi]/MAX_EXP;
      y1 = v.cy + Math.sin(t1*freq*1.2 + pi*0.5)*amp*v.h*0.12;
      y2 = v.cy + Math.sin(t2*freq*1.2 + pi*0.5)*amp*v.h*0.12;
      lines.push({x1,y1,x2,y2,color:COLORS[pi],alpha:0.08});
    }
  }

  // Horizontal center line
  lines.push({x1:v.left,y1:v.cy,x2:v.right,y2:v.cy,color:'#0ad',alpha:0.06});
  return {lines, circles};
}

const LAYOUTS = [layoutPillars, layoutRadial, layoutHexGrid, layoutConstellation, layoutMatrix, layoutWaveform];

// ======== TRANSITION ENGINE ========
function startTransition(newMode){
  if(newMode === currentMode && transitionT >= 1) return;
  targetMode = newMode;
  // Snapshot current positions as source
  for(const p of points){
    p.sx = p.x; p.sy = p.y; p.sr = p.r;
  }
  // Compute target layout
  const layout = LAYOUTS[targetMode]();
  geoTargetLines = layout.lines;
  geoTargetCircles = layout.circles;
  geoSourceLines = [...geoLines];
  geoSourceCircles = [...geoCircles];
  transitionT = 0;
  selectedPillar = -1;

  // Update label
  document.getElementById('view-label').textContent = MODE_NAMES[targetMode];
  // Update buttons
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mode) === targetMode);
  });
}

function updateTransition(){
  if(transitionT < 1){
    transitionT = Math.min(1, transitionT + TRANS_SPEED);
    const ease = transitionT < 0.5
      ? 4*transitionT*transitionT*transitionT
      : 1 - Math.pow(-2*transitionT+2,3)/2; // cubic ease in-out

    for(const p of points){
      p.x = p.sx + (p.tx - p.sx)*ease;
      p.y = p.sy + (p.ty - p.sy)*ease;
      p.r = p.sr + (p.tr - p.sr)*ease;
    }

    // Interpolate geo lines
    geoLines = [];
    // Fade out source
    for(const l of geoSourceLines){
      geoLines.push({...l, alpha: l.alpha*(1-ease)});
    }
    // Fade in target
    for(const l of geoTargetLines){
      geoLines.push({...l, alpha: l.alpha*ease});
    }
    geoCircles = [];
    for(const c of geoSourceCircles){
      geoCircles.push({...c, alpha: c.alpha*(1-ease)});
    }
    for(const c of geoTargetCircles){
      geoCircles.push({...c, alpha: c.alpha*ease});
    }

    if(transitionT >= 1){
      currentMode = targetMode;
      geoLines = geoTargetLines;
      geoCircles = geoTargetCircles;
    }
  }
}

// ======== PARTICLE SYSTEM ========
const particles = [];
const MAX_PARTICLES = 200;

function emitTransitionParticles(){
  for(let i=0;i<30;i++){
    const pi = Math.floor(Math.random()*50);
    particles.push({
      x: points[pi].x, y: points[pi].y,
      vx: (Math.random()-0.5)*3,
      vy: (Math.random()-0.5)*3,
      life: 1,
      decay: 0.01 + Math.random()*0.02,
      r: 1+Math.random()*2,
      color: points[pi].color
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if(p.life <= 0) particles.splice(i,1);
  }
  while(particles.length > MAX_PARTICLES) particles.shift();
}

// ======== AMBIENT PARTICLES ========
const ambient = [];
for(let i=0;i<60;i++){
  ambient.push({
    x:Math.random()*2000, y:Math.random()*2000,
    vx:(Math.random()-0.5)*0.12, vy:-Math.random()*0.25-0.03,
    r:Math.random()*1.2+0.4,
    color:COLORS[Math.floor(Math.random()*7)],
    a:Math.random()*0.2+0.03
  });
}

// ======== RENDERING ========
function drawBackground(t){
  ctx.fillStyle='#060610';
  ctx.fillRect(0,0,W,H);

  // Subtle center glow
  const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,H*0.5);
  grd.addColorStop(0,'rgba(0,30,60,0.05)');
  grd.addColorStop(1,'rgba(6,6,16,0)');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

  // Ambient particles
  for(const p of ambient){
    p.x += p.vx; p.y += p.vy;
    if(p.y < -10){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
    ctx.globalAlpha=p.a*(0.5+0.5*Math.sin(t*0.001+p.x));
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x%W,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawGeoLines(){
  for(const l of geoLines){
    if(l.alpha < 0.005) continue;
    ctx.globalAlpha = l.alpha;
    ctx.strokeStyle = l.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    ctx.lineTo(l.x2, l.y2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawGeoCircles(){
  for(const c of geoCircles){
    if(c.alpha < 0.005) continue;
    ctx.globalAlpha = c.alpha;
    ctx.strokeStyle = c.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPoints(t){
  for(let i=0;i<50;i++){
    const p = points[i];
    const pulse = 0.7 + 0.3*Math.sin(t*0.003 + i*0.4);

    // Glow
    ctx.globalAlpha = 0.15 * pulse;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*2.5, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.globalAlpha = 0.85 * pulse;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();

    // Digit label
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8,Math.floor(p.r*1.2))}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(DIGITS[i].toString(), p.x, p.y+1);
  }
  ctx.globalAlpha = 1;
}

function drawTransitionParticles(){
  for(const p of particles){
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Binary strip at bottom of view area
function drawBinaryStrip(t){
  const v = getViewArea();
  const y = v.bottom - 8;
  const totalW = Math.min(W-40, 165*4);
  const cellW = totalW/165;
  const ox = (W-totalW)/2;
  for(let i=0;i<165;i++){
    const bit = BINARY[i]==='1';
    const pulse = 0.5+0.5*Math.sin(t*0.002+i*0.12);
    if(bit){
      ctx.fillStyle = `rgba(0,${Math.floor(140+80*pulse)},${Math.floor(200+55*pulse)},${0.5+0.3*pulse})`;
    } else {
      ctx.fillStyle = `rgba(30,30,50,${0.15+0.1*pulse})`;
    }
    ctx.fillRect(ox+i*cellW, y, Math.max(1,cellW-0.5), 5);
  }
}

// Mode-specific overlays that animate
function drawModeOverlay(t){
  const v = getViewArea();

  if(currentMode===1 && transitionT>=1){
    // RADIAL: rotating tick marks on rings
    const maxR = Math.min(v.w,v.h)*0.42;
    for(let pi=0;pi<7;pi++){
      const ringR = maxR*(0.15+0.85*(pi/6));
      const speed = 0.0003*(pi+1);
      const angle = t*speed;
      // Small orbiting marker
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = COLORS[pi];
      ctx.beginPath();
      ctx.arc(v.cx+Math.cos(angle)*ringR, v.cy+Math.sin(angle)*ringR, 2, 0, Math.PI*2);
      ctx.fill();
      // Prime label on ring
      ctx.globalAlpha = 0.3;
      ctx.font = '9px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(PRIMES[pi].toString(), v.cx+Math.cos(angle+0.3)*ringR, v.cy+Math.sin(angle+0.3)*ringR);
    }
    ctx.globalAlpha=1;
  }

  if(currentMode===3 && transitionT>=1){
    // CONSTELLATION: twinkling effect
    for(let i=0;i<50;i++){
      const twinkle = Math.sin(t*0.005+i*1.7);
      if(twinkle>0.7){
        ctx.globalAlpha = (twinkle-0.7)*2;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(points[i].x, points[i].y, points[i].r*0.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }

  if(currentMode===5 && transitionT>=1){
    // WAVEFORM: scanning line
    const scanX = v.left + 40 + ((t*0.08)%(v.w-80));
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#0ad';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(scanX, v.top);
    ctx.lineTo(scanX, v.bottom);
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  if(currentMode===2 && transitionT>=1){
    // HEXGRID: highlight pulse propagation
    const wave = (t*0.003)%50;
    for(let i=0;i<50;i++){
      const dist = Math.abs(i-wave);
      if(dist<3){
        ctx.globalAlpha = 0.2*(1-dist/3);
        ctx.fillStyle = COLORS[i%7];
        ctx.beginPath();
        ctx.arc(points[i].x, points[i].y, points[i].r*1.8, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }

  if(currentMode===4 && transitionT>=1){
    // MATRIX: "rain" effect - occasional digit dropping
    const v2 = getViewArea();
    const cols=10;
    const cellW = Math.min(v2.w*0.08,50);
    const ox = v2.cx - (cols*cellW)/2 + cellW/2;
    for(let c=0;c<cols;c++){
      const drop = ((t*0.05+c*37)%200);
      if(drop<v2.h){
        ctx.globalAlpha = 0.08*(1-drop/v2.h);
        ctx.fillStyle = '#0ad';
        ctx.font = '10px Courier New';
        ctx.textAlign='center';
        const d = DIGITS[(Math.floor(t*0.01+c*3))%50];
        ctx.fillText(d.toString(), ox+c*cellW, v2.top+drop);
      }
    }
    ctx.globalAlpha=1;
  }
}

// Cascade text
const cascadeEl = document.createElement('div');
cascadeEl.id = 'cascade-display';
cascadeEl.style.cssText = 'position:fixed;bottom:58px;left:0;right:0;text-align:center;font-size:10px;color:#0a8;z-index:10;pointer-events:none';
document.body.appendChild(cascadeEl);

let cascadeState = {phase:'idle',primeIdx:0,expIdx:0,current:BigInt(NUM_STR),timer:0,waitTimer:0,doneTimer:0};

function formatBigNum(n){
  let s=n.toString(),r='';
  for(let i=0;i<s.length;i++){if(i>0&&(s.length-i)%3===0)r+=',';r+=s[i];}
  return r;
}

function updateCascade(t){
  const cs=cascadeState; cs.timer++;
  if(cs.phase==='idle'){
    cs.waitTimer++;
    if(cs.waitTimer>300){cs.phase='running';cs.primeIdx=0;cs.expIdx=0;cs.current=BigInt(NUM_STR);cs.timer=0;}
    if(cs.waitTimer<300){const dots='.'.repeat(Math.floor(t/500)%4);cascadeEl.innerHTML=`<span style="color:#334">FACTORIZATION CASCADE${dots}</span>`;}
    return;
  }
  if(cs.phase==='running'){
    if(cs.timer%5===0){
      const p=BigInt(PRIMES[cs.primeIdx]);cs.current=cs.current/p;cs.expIdx++;
      const color=COLORS[cs.primeIdx];
      const numStr=formatBigNum(cs.current);
      const shortened=numStr.length>36?numStr.substring(0,15)+'...'+numStr.substring(numStr.length-15):numStr;
      cascadeEl.innerHTML=`<span style="color:${color}">&div; ${PRIMES[cs.primeIdx]}</span> <span style="color:#068">[${cs.expIdx}/${EXPONENTS[cs.primeIdx]}]</span> <span style="color:#0a8">= ${shortened}</span>`;
      if(cs.expIdx>=EXPONENTS[cs.primeIdx]){cs.primeIdx++;cs.expIdx=0;if(cs.primeIdx>=7){cs.phase='done';cs.doneTimer=0;cascadeEl.innerHTML=`<span style="color:#fc0">CASCADE COMPLETE &rarr; 1</span>`;}}
    }
    return;
  }
  if(cs.phase==='done'){cs.doneTimer++;if(cs.doneTimer>300){cs.phase='idle';cs.waitTimer=0;}}
}

// ======== NUMBER DISPLAY ========
const numEl=document.getElementById('number-display');
const numPhases=DIGITS.map(()=>Math.random()*Math.PI*2);
function animateNumber(t){
  let html='';
  for(let i=0;i<NUM_STR.length;i++){
    const glow=0.5+0.5*Math.sin(t*0.003+numPhases[i]);
    const alpha=(0.6+0.4*glow).toFixed(2);
    const shadow=Math.floor(glow*20);
    if(i>0&&(NUM_STR.length-i)%3===0) html+='<span style="display:inline-block;width:3px"></span>';
    html+=`<span style="opacity:${alpha};text-shadow:0 0 ${shadow}px rgba(255,204,0,${(glow*0.6).toFixed(2)})">${NUM_STR[i]}</span>`;
  }
  numEl.innerHTML=html;
}

// ======== INTERACTION ========
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const mode=parseInt(btn.dataset.mode);
    emitTransitionParticles();
    startTransition(mode);
    autoTimer=0;
  });
});

C.addEventListener('mousemove',(e)=>{mouseX=e.clientX;mouseY=e.clientY;});

C.addEventListener('click',(e)=>{
  // Check if clicking near a point
  for(let i=0;i<50;i++){
    const dx=e.clientX-points[i].x, dy=e.clientY-points[i].y;
    if(Math.sqrt(dx*dx+dy*dy)<points[i].r*2){
      // Emit particles from that point
      for(let j=0;j<8;j++){
        particles.push({
          x:points[i].x, y:points[i].y,
          vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
          life:1, decay:0.02+Math.random()*0.02,
          r:1.5+Math.random()*2, color:points[i].color
        });
      }
      return;
    }
  }
});

// Keyboard shortcuts
document.addEventListener('keydown',(e)=>{
  const key=parseInt(e.key);
  if(key>=1 && key<=6){
    emitTransitionParticles();
    startTransition(key-1);
    autoTimer=0;
  }
  if(e.key===' '){
    e.preventDefault();
    emitTransitionParticles();
    startTransition((currentMode+1)%6);
    autoTimer=0;
  }
});

// ======== INIT & MAIN LOOP ========
// Initial layout
const initLayout = LAYOUTS[0]();
geoLines = initLayout.lines;
geoCircles = initLayout.circles;
for(const p of points){p.x=p.tx;p.y=p.ty;p.r=p.tr;}

let lastFrame=0;
function frame(now){
  const t = now;
  const dt = now-lastFrame;
  lastFrame=now;

  // Auto-cycle
  autoTimer++;
  if(autoTimer > AUTO_INTERVAL){
    autoTimer=0;
    emitTransitionParticles();
    startTransition((currentMode+1)%6);
  }

  resize(); // keep canvas sized
  updateTransition();
  updateParticles();

  drawBackground(t);
  drawGeoLines();
  drawGeoCircles();
  drawModeOverlay(t);
  drawPoints(t);
  drawTransitionParticles();
  drawBinaryStrip(t);
  animateNumber(t);
  updateCascade(t);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
