<script>
const TAU=Math.PI*2, PHI=(1+Math.sqrt(5))/2, GA=TAU/PHI/PHI
const P=[2,3,5,7,11,13,17]
const RCOL=[0x993366,0x00aadd,0xffaa00,0xff4444,0x44aa44,0xaa44ff,0xcccccc]

// ═══ THREE.JS ═══
const scene=new THREE.Scene(), cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200)
cam.position.set(0,12,25)

const sun=new THREE.DirectionalLight(0xd4a94a,.3);sun.position.set(10,20,10);scene.add(sun)
const pL=new THREE.PointLight(0xdc143c,.2,30);pL.position.set(0,8,0);scene.add(pL)

// ground
const groundGeo=new THREE.PlaneGeometry(200,200,40,40)
const groundMat=new THREE.MeshBasicMaterial({color:0x0a0610,transparent:true,opacity:.8})
const ground=new THREE.Mesh(groundGeo,groundMat);ground.rotation.x=-Math.PI/2;scene.add(ground)
// grid lines
const gridGeo=new THREE.PlaneGeometry(200,200,40,40)
const gridMat=new THREE.MeshBasicMaterial({color:0xdc143c,wireframe:true,transparent:true,opacity:.03})
const grid=new THREE.Mesh(gridGeo,gridMat);grid.rotation.x=-Math.PI/2;grid.position.y=.01;scene.add(grid)

// stars
const starGeo=new THREE.BufferGeometry(),starPos=new Float32Array(2000*3)
for(let i=0;i<6000;i++)starPos[i]=(Math.random()-.5)*100
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3))
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:.08,transparent:true,opacity:.3})))

// ═══ TREE BUILDER ═══
const trees=[],clickables=[]

function clearGarden(){
  trees.forEach(t=>scene.remove(t));trees.length=0;clickables.length=0
}

function createTrunk(h,r,color){
  const geo=new THREE.CylinderGeometry(r*.3,r,h,8)
  const mat=new THREE.MeshPhongMaterial({color:color||0x553322,emissive:color||0x221100,emissiveIntensity:.1})
  const m=new THREE.Mesh(geo,mat);m.position.y=h/2;return m
}

function createLeaves(size,color){
  const geo=new THREE.IcosahedronGeometry(size,1)
  const mat=new THREE.MeshPhongMaterial({color:color||0x228833,transparent:true,opacity:.4,emissive:color||0x114422,emissiveIntensity:.1})
  return new THREE.Mesh(geo,mat)
}

function createFlower(size,color){
  const g=new THREE.Group()
  // petals
  for(let i=0;i<5;i++){
    const petal=new THREE.Mesh(new THREE.SphereGeometry(size*.4,6,4),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:.5,blending:THREE.AdditiveBlending}))
    const a=i/5*TAU;petal.position.set(Math.cos(a)*size*.5,0,Math.sin(a)*size*.5)
    petal.scale.set(1,.3,1);g.add(petal)
  }
  // center
  g.add(new THREE.Mesh(new THREE.SphereGeometry(size*.2,6,6),
    new THREE.MeshBasicMaterial({color:0xd4a94a,transparent:true,opacity:.6})))
  return g
}

function createTree(x,z,data){
  const g=new THREE.Group();g.position.set(x,0,z)
  const h=2+Math.min(8,data.size||3), r=.3+Math.min(.8,(data.size||3)*.1)
  const tColor=new THREE.Color(data.color||'#553322')
  const lColor=new THREE.Color(data.color||'#228833')

  g.add(createTrunk(h,r,tColor.getHex()))

  // leaves canopy
  const leaves=createLeaves(1+Math.min(2,r*2),lColor.getHex())
  leaves.position.y=h;g.add(leaves)

  // flowers = children/items
  const items=data.children||[]
  const branchCount=Math.max(3,Math.min(16,Math.ceil(items.length/4)+2))
  let idx=0
  for(let i=0;i<branchCount;i++){
    const ang=i*GA,bh=h*(.3+(i/branchCount)*.5)
    const len=1.5+Math.random()*h*.25
    const end=new THREE.Vector3(Math.cos(ang)*(r+len),bh+len*.2,Math.sin(ang)*(r+len))
    // branch line
    const bGeo=new THREE.CylinderGeometry(.03,.08,len,4)
    const branch=new THREE.Mesh(bGeo,new THREE.MeshPhongMaterial({color:tColor.getHex()}))
    branch.position.set(Math.cos(ang)*(r+len*.5),bh,Math.sin(ang)*(r+len*.5))
    branch.lookAt(end);branch.rotateX(Math.PI/2);g.add(branch)

    const perBranch=Math.min(8,Math.ceil((items.length-idx)/Math.max(1,branchCount-i)))
    for(let j=0;j<perBranch&&idx<items.length;j++){
      const item=items[idx++]
      const t=.2+(j/Math.max(1,perBranch-1))*.7
      const fColor=new THREE.Color(item.color||data.color||RCOL[idx%7])
      const fSize=.2+Math.min(.5,(item.size||1)*.1)
      const flower=createFlower(fSize,fColor.getHex())
      const pos=new THREE.Vector3(Math.cos(ang)*r,bh,Math.sin(ang)*r).lerp(end,t)
      pos.x+=(Math.random()-.5)*.5;pos.y+=(Math.random()-.5)*.3;pos.z+=(Math.random()-.5)*.5
      flower.position.copy(pos)
      flower.userData={name:item.name,desc:item.desc||'',type:item.type||'item',parent:data.name}
      g.add(flower);clickables.push(flower)
    }
  }

  g.userData={name:data.name,desc:data.desc||'',type:data.type||'tree',itemCount:items.length}
  scene.add(g);trees.push(g)
  return g
}

function plantGarden(dataset){
  clearGarden()
  const n=dataset.length
  dataset.forEach((d,i)=>{
    const ang=i*GA, r=6+Math.sqrt(i)*6
    const wobble=Math.sin(i*.7)*2
    createTree(Math.cos(ang)*r+wobble,Math.sin(ang)*r+wobble*.5,d)
  })
  document.getElementById('hud').innerHTML=
    `GARDEN · <span class="v">${n} trees</span> · <span class="v">${clickables.length} flowers</span>\nhover flower for details`
}

function loadSource(src){
  src=src||document.getElementById('source').value
  document.getElementById('source').value=src
  document.getElementById('gh-input').style.display=src==='repos'?'block':'none'
  document.getElementById('gh-btn').style.display=src==='repos'?'block':'none'
  document.getElementById('custom-input').style.display=src==='custom'?'block':'none'
  document.getElementById('custom-btn').style.display=src==='custom'?'block':'none'
  if(src==='aneta')plantGarden(ANETA_DATA)
  else if(src==='medical')plantGarden(MEDICAL_DATA)
  else if(src==='songs')plantGarden(SONGS_DATA)
}

async function loadGitHub(input){
  const repo=input||document.getElementById('gh-input').value
  if(!repo)return
  document.getElementById('hud').innerHTML='loading GitHub...'
  try{
    if(repo.includes('/')){
      const r=await fetch(`https://api.github.com/repos/${repo}/contents`).then(r=>r.json())
      const files=r.filter(f=>f.type==='file').map(f=>({name:f.name,size:Math.log2(f.size||1),color:fileColor(f.name)}))
      const dirs=r.filter(f=>f.type==='dir').map(f=>({name:f.name,size:3,color:'#d4a94a',type:'dir'}))
      plantGarden([{name:repo.split('/')[1],color:'#dc143c',size:5,desc:repo,children:[...dirs,...files]}])
    } else {
      const repos=await fetch(`https://api.github.com/users/${repo}/repos?per_page=30&sort=updated`).then(r=>r.json())
      const data=repos.map(r=>({name:r.name,color:langColor(r.language),size:Math.max(2,Math.log2(r.size||1)),
        desc:`${r.language||'?'} · ★${r.stargazers_count}`,children:[]}))
      plantGarden(data)
    }
  }catch(e){document.getElementById('hud').innerHTML='error: '+e.message}
}
function loadGH(s){document.getElementById('gh-input').value=s;document.getElementById('source').value='repos';
  document.getElementById('gh-input').style.display='block';document.getElementById('gh-btn').style.display='block';loadGitHub(s)}

function loadCustom(){
  try{const d=JSON.parse(document.getElementById('custom-input').value);plantGarden(Array.isArray(d)?d:[d])}
  catch(e){document.getElementById('hud').innerHTML='JSON parse error'}
}

function fileColor(name){
  const ext=name.split('.').pop().toLowerCase()
  const m={js:'#ffaa00',ts:'#00aadd',py:'#44aa44',swift:'#ff4444',kt:'#aa44ff',html:'#dc143c',css:'#993366',
    json:'#d4a94a',md:'#888888',svg:'#ff8800',png:'#00aadd',mp3:'#44aa44',mp4:'#ff4444'}
  return m[ext]||'#666666'
}
function langColor(lang){
  const m={JavaScript:'#ffaa00',TypeScript:'#00aadd',Python:'#44aa44',Swift:'#ff4444',Kotlin:'#aa44ff',
    HTML:'#dc143c',CSS:'#993366',Java:'#ff8800',Go:'#00aadd',Rust:'#d4a94a'}
  return m[lang]||'#666666'
}

// ═══ CAMERA ═══
let camTh=0,camPh=.4,camR=30,drag=false,dx=0,dy=0
R.domElement.addEventListener('pointerdown',e=>{drag=true;dx=e.clientX;dy=e.clientY})
addEventListener('pointerup',()=>drag=false)
addEventListener('pointermove',e=>{if(!drag)return;camTh-=(e.clientX-dx)*.005;camPh+=(e.clientY-dy)*.003;
  camPh=Math.max(.05,Math.min(1.2,camPh));dx=e.clientX;dy=e.clientY})
R.domElement.addEventListener('wheel',e=>{camR=Math.max(8,Math.min(80,camR+e.deltaY*.03))},{passive:true})

// ═══ RAYCASTER ═══
const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2()
addEventListener('pointermove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1
  const tip=document.getElementById('tip');if(tip.style.display==='block'){tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px'}})

// ═══ ANIMATE ═══
let lt=0
function animate(ts){
  requestAnimationFrame(animate)
  const t=ts*.001

  // trees sway
  trees.forEach((g,i)=>{g.rotation.y=Math.sin(t*.3+i)*.02;g.children.forEach(c=>{
    if(c.type==='Group')c.rotation.y+=.003})})

  // camera
  cam.position.x=Math.cos(camTh)*Math.cos(camPh)*camR
  cam.position.y=Math.sin(camPh)*camR
  cam.position.z=Math.sin(camTh)*Math.cos(camPh)*camR
  cam.lookAt(0,2,0)

  // hover
  raycaster.setFromCamera(mouse,cam)
  const hits=raycaster.intersectObjects(clickables,true)
  if(hits.length){
    let obj=hits[0].object;while(obj.parent&&!obj.userData?.name)obj=obj.parent
    if(obj.userData?.name){
      const tip=document.getElementById('tip')
      tip.innerHTML=`<div class="tt">${obj.userData.name}</div><div class="td">${obj.userData.desc||''}</div>`+
        (obj.userData.parent?`<div class="tk">${obj.userData.parent}</div>`:'')
      tip.style.display='block'
    }
  } else document.getElementById('tip').style.display='none'

  R.render(scene,cam)
}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)})
loadSource('aneta')
animate(0)
</script>
