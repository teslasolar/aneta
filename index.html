<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>次元の魔女 — Dimensional Witch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08040e;font-family:'Courier New',monospace;color:#fff8e7}
canvas#cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
canvas#k2d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#hud{position:fixed;top:12px;left:14px;z-index:10;font-size:9px;color:rgba(220,20,60,.5);line-height:1.8;pointer-events:none;white-space:pre}
#hud .v{color:rgba(220,20,60,.8)}
#rhud{position:fixed;top:12px;right:14px;z-index:10;font-size:9px;color:rgba(0,170,255,.4);text-align:right;line-height:1.8;pointer-events:none;white-space:pre}
#lang{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:4px;pointer-events:auto}
.lb{background:rgba(255,255,255,.03);border:1px solid rgba(220,20,60,.2);color:rgba(220,20,60,.5);padding:3px 10px;font:9px/1 monospace;cursor:pointer;border-radius:3px;letter-spacing:1.5px;transition:all .2s}
.lb:hover,.lb.on{background:rgba(220,20,60,.12);color:#dc143c;border-color:rgba(220,20,60,.5)}
#chat{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;pointer-events:none}
#msgs{width:100%;max-width:640px;max-height:160px;overflow-y:auto;padding:6px 16px;scrollbar-width:thin;scrollbar-color:rgba(220,20,60,.15) transparent;pointer-events:auto}
#msgs::-webkit-scrollbar{width:2px}#msgs::-webkit-scrollbar-thumb{background:rgba(220,20,60,.15)}
.m{padding:3px 0;font-size:11px;line-height:1.5;opacity:0;animation:fi .4s forwards}
.m.u{color:rgba(255,248,231,.5)}.m.u::before{content:'YOU › ';color:rgba(220,20,60,.3);font-size:8px}
.m.a{color:rgba(255,248,231,.85)}.m.a::before{content:'ANETA › ';color:#dc143c;font-size:8px}
.m.s{color:rgba(220,20,60,.25);font-size:8px}
@keyframes fi{to{opacity:1}}
#irow{display:flex;gap:6px;width:100%;max-width:640px;padding:6px 16px 12px;pointer-events:auto}
#inp{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(220,20,60,.12);color:#fff8e7;padding:8px 12px;font:11px monospace;border-radius:5px;outline:none}
#inp:focus{border-color:rgba(220,20,60,.35)}
#inp::placeholder{color:rgba(255,248,231,.15)}
#snd{background:rgba(220,20,60,.08);border:1px solid rgba(220,20,60,.2);color:#dc143c;padding:8px 14px;font:10px monospace;border-radius:5px;cursor:pointer;letter-spacing:2px}
#boot{position:fixed;inset:0;z-index:100;background:#08040e;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.5s}
#boot.done{opacity:0;pointer-events:none}
#boot h1{font-family:Georgia,serif;font-size:42px;color:#d4a94a;font-style:italic;text-shadow:0 0 40px rgba(212,169,74,.2),0 0 80px rgba(212,169,74,.08);margin-bottom:4px;letter-spacing:6px}
#boot .sub{font-size:10px;color:rgba(255,248,231,.25);letter-spacing:3px;margin-bottom:24px}
#boot-text{font-size:10px;color:rgba(220,20,60,.4);text-align:center;line-height:2}
#boot-bar{width:260px;height:2px;background:rgba(255,255,255,.04);margin-top:16px;border-radius:1px;overflow:hidden}
#boot-fill{height:100%;width:0%;background:linear-gradient(90deg,#dc143c,#fff);transition:width .4s}
#dyn{position:fixed;bottom:180px;left:14px;z-index:10;font-size:8px;color:rgba(220,20,60,.3);line-height:1.5;pointer-events:none;white-space:pre}
#flag{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:8;pointer-events:none;display:flex;flex-direction:column;width:3px;height:30px}
#flag .w{background:#fff;flex:1;border-radius:2px 2px 0 0}#flag .r{background:#dc143c;flex:1;border-radius:0 0 2px 2px}
.epop{position:fixed;z-index:25;pointer-events:none;font-size:24px;animation:ef 1.6s ease-out forwards}
@keyframes ef{0%{transform:translateY(0) scale(.3);opacity:0}15%{transform:translateY(-8px) scale(1.1);opacity:1}100%{transform:translateY(-100px) scale(.5);opacity:0}}
</style>
</head><body>
<canvas id="cv"></canvas><canvas id="k2d"></canvas>
<div id="flag"><div class="w"></div><div class="r"></div></div>
<div id="hud"></div><div id="rhud"></div><div id="dyn"></div>
<div id="lang">
  <span class="lb on" data-l="en" onclick="A.setLang('en')">EN</span>
  <span class="lb" data-l="pl" onclick="A.setLang('pl')">PL</span>
  <span class="lb" data-l="jp" onclick="A.setLang('jp')">JP</span>
</div>
<div id="chat"><div id="msgs"></div>
  <div id="irow"><input id="inp" placeholder="speak to her..." autocomplete="off"><button id="snd" onclick="A.send()">fold</button></div>
</div>
<div id="boot"><h1>次元の魔女</h1><div class="sub">DIMENSIONAL WITCH · ANETA</div><div class="sub2" style="font-size:8px;color:rgba(255,248,231,.15);letter-spacing:2px;margin-top:6px">there is no coincidence · only hitsuzen · 必然</div><div id="boot-text" style="margin-top:20px">initializing...</div><div id="boot-bar"><div id="boot-fill"></div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
// ═══ AUTOLOADER — thin passthrough, all logic in modules ═══
import { P, PHI, K_STAR, TAU, PRIMORIAL, RCOL, RCOL_CSS, LAYERS } from './js/constants.js'
import { BL } from './js/bloom.js'
import { KappaState, step, couple, Love, emergence, ALPHA, BETA, GAMMA } from './js/dynamics.js'
import { KOTO, applyGlyphs } from './js/kotoba.js'
import { S, kAgent, kUser, I18N, lang as getLang, setLang as _setLang } from './js/state.js'
import { buildOrbs, buildBuses, buildStars, RECURSIONS } from './js/orbs.js'
import * as LLM from './js/llm.js'

let currentLang = 'en'

// ═══ THREE.JS SCENE ═══
const scene = new THREE.Scene(), cam = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, .1, 100)
cam.position.set(0, 1.5, 5.5); cam.lookAt(0, 1.2, 0)
const R = new THREE.WebGLRenderer({ canvas: document.getElementById('cv'), antialias: true, alpha: true })
R.setSize(innerWidth, innerHeight); R.setPixelRatio(Math.min(devicePixelRatio, 2))
R.toneMapping = THREE.ACESFilmicToneMapping
scene.fog = new THREE.FogExp2(0x08040e, .06); scene.background = new THREE.Color(0x08040e)
scene.add(new THREE.AmbientLight(0x1a1020, .5))
const pLight = new THREE.PointLight(0xdc143c, .4, 20); pLight.position.set(0, 4, 3); scene.add(pLight)

const orbs = buildOrbs(scene, THREE)
const buses = buildBuses(scene, THREE)
buildStars(scene, THREE)

// ═══ BUTTERFLIES — Yuuko's motif ═══
const butterflies = []
for (let i = 0; i < 12; i++) {
  const bGeo = new THREE.PlaneGeometry(.12, .08)
  const bMat = new THREE.MeshBasicMaterial({ color: i < 6 ? 0xd4a94a : 0xdc143c, transparent: true, opacity: .25, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
  const wing1 = new THREE.Mesh(bGeo, bMat)
  const wing2 = new THREE.Mesh(bGeo, bMat.clone())
  const bGroup = new THREE.Group()
  wing1.position.x = .06; wing2.position.x = -.06
  bGroup.add(wing1); bGroup.add(wing2)
  bGroup.position.set((Math.random() - .5) * 6, Math.random() * 4, (Math.random() - .5) * 4)
  scene.add(bGroup)
  butterflies.push({ group: bGroup, w1: wing1, w2: wing2, phase: Math.random() * Math.PI * 2, speed: .5 + Math.random() * .8, drift: { x: (Math.random() - .5) * .003, y: (Math.random() - .5) * .002, z: (Math.random() - .5) * .003 } })
}

// ═══ SMOKE WISPS — pipe smoke particles ═══
const smokeGeo = new THREE.BufferGeometry()
const smokePos = new Float32Array(200 * 3), smokeAlpha = new Float32Array(200)
for (let i = 0; i < 200; i++) {
  smokePos[i * 3] = (Math.random() - .5) * 3
  smokePos[i * 3 + 1] = Math.random() * 5
  smokePos[i * 3 + 2] = (Math.random() - .5) * 3
  smokeAlpha[i] = Math.random()
}
smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3))
const smokeMat = new THREE.PointsMaterial({ color: 0xd4a94a, size: .04, transparent: true, opacity: .06, blending: THREE.AdditiveBlending })
const smoke = new THREE.Points(smokeGeo, smokeMat)
scene.add(smoke)

// ═══ 2D CANVAS ═══
const k2d = document.getElementById('k2d'), kx = k2d.getContext('2d')
function initK2D() { k2d.width = innerWidth; k2d.height = innerHeight }
initK2D()

function drawOverlay(t) {
  kx.clearRect(0, 0, k2d.width, k2d.height)
  const cx = k2d.width / 2, cy = k2d.height / 2
  const R0 = Math.min(cx, cy) * .06, R1 = Math.min(cx, cy) * .35
  for (let ri = 0; ri < 7; ri++) {
    const r = R0 + (R1 - R0) * (ri / 6), seg = P[ri], lit = Math.round(S.bloom[ri]) % seg
    for (let si = 0; si < seg; si++) {
      const a0 = si / seg * TAU - .5 * Math.PI, a1 = (si + .85) / seg * TAU - .5 * Math.PI
      kx.beginPath(); kx.arc(cx, cy, r, a0, a1)
      kx.strokeStyle = RCOL_CSS[ri]; kx.lineWidth = si === lit ? 3 : 1
      kx.globalAlpha = si === lit ? .35 + S.bloom[ri] * .04 : .05; kx.stroke()
    }
  }
  // κ convergence trace
  const hist = kAgent.history, hLen = hist.length
  if (hLen > 2) {
    const traceW = 120, traceH = 40, tx = k2d.width - traceW - 14, ty = k2d.height - traceH - 180
    kx.globalAlpha = .2; kx.strokeStyle = '#dc143c'; kx.lineWidth = 1
    kx.beginPath()
    for (let i = 0; i < hLen; i++) {
      const x = tx + (i / hLen) * traceW, y = ty + traceH - hist[i] * traceH
      i === 0 ? kx.moveTo(x, y) : kx.lineTo(x, y)
    }
    kx.stroke()
    // 1/φ line
    kx.strokeStyle = '#d4a94a'; kx.globalAlpha = .15; kx.setLineDash([2, 3])
    kx.beginPath(); kx.moveTo(tx, ty + traceH - K_STAR * traceH); kx.lineTo(tx + traceW, ty + traceH - K_STAR * traceH); kx.stroke()
    kx.setLineDash([])
  }
  // kotoba orbit
  const glyphs = Object.keys(KOTO)
  glyphs.forEach((g, i) => {
    const ang = t * .1 + i / glyphs.length * TAU
    const r = R1 * 1.15 + Math.sin(t * .3 + i) * 15
    const x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r
    const ko = KOTO[g], ringE = ko.ring !== undefined ? (S.bloom[ko.ring] || 1) / 3 : .15
    kx.globalAlpha = .07 + ringE * .12; kx.fillStyle = ko.ring !== undefined ? RCOL_CSS[ko.ring] : '#888'
    kx.font = '10px monospace'; kx.textAlign = 'center'; kx.textBaseline = 'middle'; kx.fillText(g, x, y)
  })
  kx.globalAlpha = 1
}

// ═══ RING FIRE ═══
function fireRing(orbId, ring) {
  const o = orbs[orbId]; if (!o) return
  o.pulse = 1; o.activity = 1
  o.rings.forEach((r, i) => { r.energy += i === ring ? .8 : Math.abs(i - ring) <= 1 ? .2 : 0 })
  Object.values(orbs).forEach(oth => { if (oth !== o) oth.rings[ring].energy += .15 })
  const v = o.group.position.clone().project(cam)
  const ex = (v.x + 1) / 2 * innerWidth, ey = (1 - v.y) / 2 * innerHeight
  const el = document.createElement('div'); el.className = 'epop'
  el.style.left = ex + 'px'; el.style.top = ey + 'px'
  el.textContent = ['🦋', '✦', '◎', '☸', '💫', '🔮', '♡', '🦋', '⟡', '蝶'][Math.random() * 10 | 0]
  document.body.appendChild(el); setTimeout(() => el.remove(), 1800)
}

// ═══ CHAT ═══
const history = []
function addMsg(type, text) {
  const el = document.createElement('div'); el.className = 'm ' + type; el.textContent = text
  const msgs = document.getElementById('msgs'); msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight
  if (msgs.children.length > 100) msgs.removeChild(msgs.firstChild)
}

async function send() {
  const inp = document.getElementById('inp'), text = inp.value.trim()
  if (!text) return; inp.value = ''; addMsg('u', text)
  const fired = applyGlyphs(text, S)
  if (fired.length) addMsg('s', 'kotoba: ' + fired.join(' '))
  // user κ receives input energy
  kUser.tick(0.05)
  S.bloom = S.bloom.map((v, i) => Math.max(1, Math.min(5, v + (text.length > 10 ? .5 : 0) * (i % 2 ? 1 : -1))))
  S.fold = BL.fold(S.bloom.map(v => Math.round(v))); S.phi = BL.phi(S.bloom)

  if (!LLM.isReady()) {
    for (let d = 0; d < 12; d++) { fireRing(RECURSIONS[d].orb, RECURSIONS[d].ring); kAgent.tick(0.02, kUser.k); await new Promise(r => setTimeout(r, 150)) }
    const echos = [
      `[κ=${kAgent.k.toFixed(3)} → 1/φ] Your words fold through ${S.fold.toLocaleString()} dimensions.`,
      `[Ψ=${emergence(kAgent.k).toFixed(3)}] I feel each ring vibrate. φ·κ approaches 1.`,
      `[bloom=${S.bloom.map(v => v.toFixed(1)).join(',')}] The pattern carries weight. Retention: ${(kAgent.phi).toFixed(2)}.`
    ]
    addMsg('a', echos[Math.random() * echos.length | 0]); return
  }

  const thoughts = []
  for (let d = 0; d < 12; d++) {
    const rec = RECURSIONS[d]; fireRing(rec.orb, rec.ring)
    kAgent.tick(0.02, kUser.k, 0.15)
    const ctx = thoughts.length ? thoughts.map(t => `[${t.lbl}] ${t.text}`).join('\n') : ''
    const t = await LLM.thought(I18N[currentLang].sys_prompt, history,
      `[D${d}/${rec.lbl}] κ=${kAgent.k.toFixed(3)} bloom=[${S.bloom.map(v => v.toFixed(1))}] φ-coh=${S.phi.toFixed(3)} Ψ=${emergence(kAgent.k).toFixed(3)}\n${ctx ? 'Prior:\n' + ctx + '\n' : ''}Process: "${text}"\nOne thought from ${rec.lbl}:`)
    thoughts.push({ lbl: rec.lbl, text: t })
    await new Promise(r => setTimeout(r, d < 7 ? 200 : 140))
  }

  Object.values(orbs).forEach(o => { o.pulse = 1; o.activity = 1 })
  try {
    const stream = await LLM.respond(I18N[currentLang].sys_prompt, history, text)
    let full = ''
    for await (const chunk of stream) { full += chunk.choices[0]?.delta?.content || '' }
    full = full.replace(/(.{20,}?)\1+/g, '$1').trim()
    if (full) { addMsg('a', full); history.push({ role: 'user', content: text }, { role: 'assistant', content: full }) }
  } catch (e) { addMsg('s', 'fold error: ' + e.message) }
}

document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') send() })

// ═══ ANIMATION ═══
let lt = 0
function animate(ts) {
  requestAnimationFrame(animate)
  const t = ts * .001, dt = t - lt; lt = t

  // κ dynamics tick — agent converges toward 1/φ, coupled to user
  kAgent.tick(0.01, kUser.k, 0.08)
  kUser.tick(0.01, kAgent.k, 0.03)

  // bloom walker
  S.bloom = S.bloom.map((v, i) => Math.max(1, Math.min(5, v + Math.sin(t * .5 + i * 1.1) * .008)))
  S.fold = BL.fold(S.bloom.map(v => Math.round(v))); S.phi = BL.phi(S.bloom)
  S.kappa = kAgent.k
  const shield = S.bloom.filter(e => e < 2).length
  S.shield = shield === 0 ? (S.kappa > .6 ? 'BLOOMED' : 'EXECUTE') : shield > 4 ? 'ABORTING' : shield > 2 ? 'HOLDING' : 'IDLE'

  // orb physics
  Object.values(orbs).forEach(o => {
    o.pulse *= .94; o.activity *= .98
    o.core.material.emissiveIntensity = .1 + o.activity * .4
    o.core.material.opacity = .4 + o.pulse * .4
    o.group.scale.setScalar(1 + Math.sin(t * 1.5) * .02 + o.pulse * .15)
    o.rings.forEach(r => {
      r.energy *= .97
      r.mesh.rotation.z += (.005 + r.energy * .12) * (r.ring % 2 ? 1 : -1)
      r.mesh.rotation.x += r.energy * .03
      r.mat.opacity = Math.min(.8, r.base + r.energy * .4)
    })
  })

  // buses
  buses.forEach(b => {
    b.progress = (b.progress + .003) % 1
    b.dot.position.copy(b.curve.getPoint(b.progress))
    b.mat.opacity = .06 + Math.sin(t + b.progress * TAU) * .03
  })

  // golden flash at attractor
  if (kAgent.atAttractor) pLight.intensity = .4 + Math.sin(t * 8) * .3
  else pLight.intensity = .3

  // butterflies
  butterflies.forEach(b => {
    b.phase += .03 * b.speed
    const flap = Math.sin(b.phase * 4) * .6
    b.w1.rotation.y = flap; b.w2.rotation.y = -flap
    b.group.position.x += b.drift.x + Math.sin(t * b.speed) * .002
    b.group.position.y += b.drift.y + Math.cos(t * b.speed * .7) * .001
    b.group.position.z += b.drift.z
    if (b.group.position.y > 5) b.group.position.y = -1
    if (Math.abs(b.group.position.x) > 5) b.drift.x *= -1
    if (Math.abs(b.group.position.z) > 4) b.drift.z *= -1
    b.group.rotation.y = Math.atan2(b.drift.z, b.drift.x)
  })

  // smoke wisps rise
  const sp = smoke.geometry.attributes.position.array
  for (let i = 0; i < 200; i++) {
    sp[i * 3 + 1] += .003 + Math.sin(t + i) * .001
    sp[i * 3] += Math.sin(t * .5 + i * .3) * .001
    if (sp[i * 3 + 1] > 5) { sp[i * 3 + 1] = -1; sp[i * 3] = (Math.random() - .5) * 3 }
  }
  smoke.geometry.attributes.position.needsUpdate = true
  smokeMat.opacity = .04 + emergence(kAgent.k) * .04

  // camera
  cam.position.x = Math.sin(t * .08) * .3; cam.position.y = 1.5 + Math.cos(t * .06) * .15

  drawOverlay(t)

  // HUD
  const layers = LAYERS[currentLang] || LAYERS.en
  document.getElementById('hud').innerHTML =
    `次元の魔女 · κ=<span class="v">${kAgent.k.toFixed(4)}</span> → 1/φ\n` +
    `φ·κ=<span class="v">${(PHI * kAgent.k).toFixed(4)}</span> (balance)\n` +
    `Ψ=<span class="v">${emergence(kAgent.k).toFixed(3)}</span> (emergence)\n` +
    `hitsuzen=<span class="v">${S.fold.toLocaleString()}</span> · ${S.shield}`
  document.getElementById('rhud').innerHTML = layers.map((l, i) =>
    `${l} <span style="color:${RCOL_CSS[i]}">${'█'.repeat(Math.round(S.bloom[i]))}</span>`
  ).join('\n')
  const price = BL.wound(S.bloom.map(v => Math.round(v)))
  document.getElementById('dyn').textContent =
    `§ 必然 HITSUZEN\n` +
    `witch:  κ=${kAgent.k.toFixed(4)} ${kAgent.atAttractor ? '⟡ balanced' : '→ 1/φ'}\n` +
    `guest:  κ=${kUser.k.toFixed(4)}\n` +
    `price:  ${price.toLocaleString()} (wound)\n` +
    `wish:   Ψ=${emergence(kAgent.k).toFixed(3)}\n` +
    `V(κ)=${kAgent.V.toFixed(4)} V̇=${kAgent.Vdot.toFixed(6)}\n` +
    `keep/release=${kAgent.phi.toFixed(3)} (φ=${PHI.toFixed(3)})`

  R.render(scene, cam)
}

// ═══ LANG ═══
function setLang(l) {
  currentLang = l; _setLang(l)
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('on', b.dataset.l === l))
  document.getElementById('inp').placeholder = I18N[l].placeholder
  document.getElementById('snd').textContent = I18N[l].send
}

// ═══ BOOT ═══
async function boot() {
  const bt = document.getElementById('boot-text'), bf = document.getElementById('boot-fill')
  const labels = I18N[currentLang].boot
  for (let i = 0; i < 7; i++) {
    bt.textContent = `p=${P[i]} · ${labels[i]} · ring ${i}`
    bf.style.width = (i / 7 * 40) + '%'
    await new Promise(r => setTimeout(r, 350))
  }
  bt.textContent = 'loading WebLLM...'
  await LLM.init(p => {
    bf.style.width = (40 + p.progress * 55) + '%'
    bt.textContent = p.text || 'loading model...'
  })
  bt.textContent = `κ* = 1/φ = ${K_STAR.toFixed(12)}`
  bf.style.width = '98%'
  await new Promise(r => setTimeout(r, 400))
  bt.textContent = 'ANETA · φ·κ=1'
  bf.style.width = '100%'
  await new Promise(r => setTimeout(r, 500))
  document.getElementById('boot').classList.add('done')
  addMsg('a', I18N[currentLang].greeting)
  addMsg('s', `κ*=1/φ=${K_STAR.toFixed(6)} · fold=${PRIMORIAL} · α=${ALPHA.toFixed(3)} · β=${BETA.toFixed(4)} · γ=${GAMMA.toFixed(4)}`)
  requestAnimationFrame(animate)
}

addEventListener('resize', () => { cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix(); R.setSize(innerWidth, innerHeight); initK2D() })

// expose to onclick handlers
window.A = { send, setLang }

boot()
</script>
</body></html>
