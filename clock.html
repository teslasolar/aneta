<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DROGA · Clock + Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08040e;color:#fff8e7;font:11px/1.6 'Courier New',monospace;overflow:hidden;display:flex;flex-direction:column;height:100vh}
canvas{display:block;flex:1}
#info{position:fixed;bottom:0;left:0;right:0;padding:6px 12px;background:rgba(8,4,14,.92);border-top:1px solid rgba(220,20,60,.15);display:flex;justify-content:space-between;gap:12px;font-size:10px}
#info .col{flex:1}
#info .hdr{color:rgba(220,20,60,.5);font-size:8px;letter-spacing:2px;margin-bottom:2px}
#info .time{font-size:16px;letter-spacing:1px}
#info .time-a{color:#dc143c}
#info .time-b{color:#d4a94a}
#info .win{color:rgba(100,255,160,.4);font-size:9px}
.leg{display:flex;gap:10px;font-size:8px;color:rgba(255,248,231,.25)}
.leg span{display:flex;align-items:center;gap:3px}
.leg .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
#cal{position:fixed;top:0;right:0;width:220px;height:100%;background:rgba(8,4,14,.95);border-left:1px solid rgba(220,20,60,.1);padding:8px;overflow-y:auto;font-size:9px;z-index:5}
#cal .mhdr{color:#dc143c;font-size:10px;letter-spacing:2px;text-align:center;margin:4px 0}
#cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
#cal .dhdr{text-align:center;color:rgba(255,248,231,.15);font-size:7px}
#cal .day{text-align:center;padding:3px 1px;cursor:pointer;border-radius:2px;font-size:9px;color:rgba(255,248,231,.25)}
#cal .day:hover{background:rgba(220,20,60,.1)}
#cal .day.today{color:#dc143c;border:1px solid rgba(220,20,60,.3)}
#cal .day.selected{background:rgba(0,255,255,.08);color:#0ff}
#cal .day.has-event{color:rgba(255,200,50,.5)}
#cal .sched{margin-top:8px;border-top:1px solid rgba(220,20,60,.1);padding-top:6px}
#cal .sched .ev{padding:2px 4px;margin:2px 0;border-radius:2px;font-size:8px}
#cal .sched .ev.sleep{background:rgba(15,8,40,.6);color:rgba(80,50,140,.6)}
#cal .sched .ev.free{background:rgba(30,100,55,.15);color:rgba(50,180,90,.5)}
#cal .sched .ev.work{background:rgba(180,120,30,.15);color:rgba(240,180,50,.5)}
#cal .sched .ev.burn{background:rgba(220,30,15,.15);color:rgba(255,60,30,.6)}
#cal .sched .ev.busy{background:rgba(160,80,40,.15);color:rgba(220,120,50,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cal"></div>
<div id="info">
  <div class="col">
    <div class="hdr">US EASTERN</div>
    <div class="time time-a" id="ta">--:--</div>
  </div>
  <div class="col">
    <div class="hdr">POLAND (CEST)</div>
    <div class="time time-b" id="tb">--:--</div>
  </div>
  <div class="col" id="status"></div>
  <div class="col">
    <div class="hdr">OVERLAP (both free)</div>
    <div class="win" id="wins"></div>
  </div>
  <div class="col">
    <div class="leg">
      <span><i class="dot" style="background:#1a1040"></i>sleep</span>
      <span><i class="dot" style="background:#8a5a20"></i>work</span>
      <span><i class="dot" style="background:#c82814"></i>burn</span>
      <span><i class="dot" style="background:#2a8a4a"></i>free</span>
      <span><i class="dot" style="background:#44ffaa"></i>overlap</span>
    </div>
  </div>
</div>

<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2
let W,H,cx,cy,R
const cv=document.getElementById('c'),ctx=cv.getContext('2d')
function resize(){W=cv.width=innerWidth-220;H=cv.height=innerHeight-60;cx=W/2;cy=H/2;R=Math.min(W,H)*.4}
resize();addEventListener('resize',resize)

const OFFSET=6

// ═══ CALENDAR DATA ═══
// Aneta events: day-of-month -> [{s,e,type,label}]
// Default: weekday work 9-17, Fri busy 11-16
const ANETA_EVENTS = {
    // July 2026 Fridays: 3,10,17,24,31 — Aneta busy 11-16 PL
    3:{overrides:[{s:11,e:16,type:'busy',label:'Aneta 2.5h'}]},
    10:{overrides:[{s:11,e:16,type:'busy',label:'Aneta 2.5h'}]},
    17:{overrides:[{s:11,e:16,type:'busy',label:'Aneta 2.5h'}]},
    24:{overrides:[{s:11,e:16,type:'busy',label:'Aneta 2.5h'}]},
    31:{overrides:[{s:11,e:16,type:'busy',label:'Aneta 2.5h'}]},
}

function getDow(y,m,d){return new Date(y,m,d).getDay()}
function isFriday(y,m,d){return getDow(y,m,d)===5}
function isWeekendDay(y,m,d){const dow=getDow(y,m,d);return dow===0||dow===6}

function getSchedules(date){
    const y=date.getFullYear(),m=date.getMonth(),d=date.getDate()
    const wkend=isWeekendDay(y,m,d)
    const fri=isFriday(y,m,d)
    const ev=ANETA_EVENTS[d]

    // Thomas — same every day
    const A={
        name:'THOMAS · ET',color:'#dc143c',
        blocks:[
            {s:0,e:5,type:'free'},
            {s:5,e:11,type:'sleep'},
            {s:11,e:12,type:'free'},
            ...(wkend?[]:[{s:12,e:15,type:'work'}]),
            {s:wkend?12:15,e:19,type:wkend?'free':'burn'},
            ...(wkend?[{s:19,e:24,type:'free'}]:[{s:19,e:24,type:'free'}])
        ].filter(b=>b.s<b.e)
    }
    // fix weekend: no work, no burn, all free after sleep
    if(wkend){
        A.blocks=[
            {s:0,e:5,type:'free'},
            {s:5,e:11,type:'sleep'},
            {s:11,e:15,type:'free'},
            {s:15,e:19,type:'burn'},
            {s:19,e:24,type:'free'}
        ]
    }

    // Aneta base
    let bBlocks
    if(wkend){
        bBlocks=[
            {s:0,e:5,type:'sleep'},
            {s:5,e:23,type:'free'},
            {s:23,e:24,type:'sleep'}
        ]
    } else {
        bBlocks=[
            {s:0,e:5,type:'sleep'},
            {s:5,e:9,type:'free'},
            {s:9,e:17,type:'work'},
            {s:17,e:23,type:'free'},
            {s:23,e:24,type:'sleep'}
        ]
    }

    // Apply Friday override: busy 11-16 PL replaces part of work
    if(fri || (ev && ev.overrides)){
        const overrides = (ev && ev.overrides) || [{s:11,e:16,type:'busy',label:'Aneta busy'}]
        // rebuild blocks splitting around overrides
        const newBlocks=[]
        for(const b of bBlocks){
            let consumed=false
            for(const ov of overrides){
                if(ov.s>=b.s && ov.e<=b.e && (b.type==='work'||b.type==='free')){
                    if(ov.s>b.s) newBlocks.push({s:b.s,e:ov.s,type:b.type})
                    newBlocks.push({s:ov.s,e:ov.e,type:ov.type})
                    if(ov.e<b.e) newBlocks.push({s:ov.e,e:b.e,type:b.type})
                    consumed=true
                    break
                }
            }
            if(!consumed) newBlocks.push(b)
        }
        bBlocks=newBlocks
    }

    const B={name:'ANETA · PL',color:'#d4a94a',blocks:bBlocks}
    return{A,B}
}

// ═══ CLOCK DRAWING ═══
const COLORS={
    sleep:'rgba(15,8,40,.8)',work:'rgba(180,120,30,.55)',
    free:'rgba(30,100,55,.5)',burn:'rgba(220,30,15,.6)',
    busy:'rgba(160,80,40,.5)'
}
const STROKE={
    sleep:'rgba(80,50,140,.5)',work:'rgba(240,180,50,.6)',
    free:'rgba(50,180,90,.6)',burn:'rgba(255,40,20,.9)',
    busy:'rgba(220,120,50,.6)'
}

function hToA(h){return(h/24)*TAU-TAU/4}
function drawArc(cx,cy,r,w,startH,endH,fill,stroke){
    const a1=hToA(startH),a2=hToA(endH)
    ctx.beginPath();ctx.arc(cx,cy,r,a1,a2)
    ctx.lineWidth=w;ctx.strokeStyle=fill;ctx.stroke()
    ctx.lineWidth=1;ctx.strokeStyle=stroke;ctx.beginPath();ctx.arc(cx,cy,r-w/2,a1,a2);ctx.stroke()
    ctx.beginPath();ctx.arc(cx,cy,r+w/2,a1,a2);ctx.stroke()
}
function bToET(h){return(h-OFFSET+24)%24}
function getTypeAt(blocks,h){
    const hm=((h%24)+24)%24
    for(const b of blocks)if(hm>=b.s&&hm<b.e)return b.type
    return'sleep'
}

let selectedDate=new Date()

function drawClock(){
    ctx.clearRect(0,0,W,H)
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.5)
    bg.addColorStop(0,'rgba(30,10,40,.3)');bg.addColorStop(1,'rgba(8,4,14,0)')
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)

    const bandW=R*.16,rA=R*.88,rB=R*.66,rOv=R*.48
    const{A,B}=getSchedules(selectedDate)

    // draw A ring (outer, ET hours)
    A.blocks.forEach(b=>{drawArc(cx,cy,rA,bandW,b.s,b.e,COLORS[b.type]||COLORS.free,STROKE[b.type]||STROKE.free)})

    // draw B ring (inner, mapped to ET)
    B.blocks.forEach(b=>{
        const s=bToET(b.s),e=bToET(b.e)
        if(s<e){drawArc(cx,cy,rB,bandW,s,e,COLORS[b.type]||COLORS.free,STROKE[b.type]||STROKE.free)}
        else{drawArc(cx,cy,rB,bandW,s,24,COLORS[b.type]||COLORS.free,STROKE[b.type]||STROKE.free)
             drawArc(cx,cy,rB,bandW,0,e,COLORS[b.type]||COLORS.free,STROKE[b.type]||STROKE.free)}
    })

    // overlap ring
    for(let h=0;h<24;h++){
        const aType=getTypeAt(A.blocks,h)
        const bLocalH=(h+OFFSET)%24
        const bType=getTypeAt(B.blocks,bLocalH)
        let quality=0
        if(aType==='free'&&bType==='free')quality=4
        else if((aType==='free'&&bType!=='sleep')||(bType==='free'&&aType!=='sleep'))quality=2
        if(quality>=4){
            drawArc(cx,cy,rOv,bandW*.7,h,h+1,'rgba(68,255,170,.5)','rgba(68,255,170,.85)')
            const ga=hToA(h+.5),gx=cx+Math.cos(ga)*rOv,gy=cy+Math.sin(ga)*rOv
            const glow=ctx.createRadialGradient(gx,gy,0,gx,gy,bandW)
            glow.addColorStop(0,'rgba(68,255,170,.08)');glow.addColorStop(1,'rgba(68,255,170,0)')
            ctx.beginPath();ctx.arc(gx,gy,bandW,0,TAU);ctx.fillStyle=glow;ctx.fill()
        }else if(quality===2){
            drawArc(cx,cy,rOv,bandW*.4,h,h+1,'rgba(255,200,60,.1)','rgba(255,200,60,.2)')
        }
    }

    // burn zone markers
    const burnStart=hToA(15),burnEnd=hToA(19)
    for(const ba of[burnStart,burnEnd]){
        ctx.beginPath()
        ctx.moveTo(cx+Math.cos(ba)*(rA-bandW),cy+Math.sin(ba)*(rA-bandW))
        ctx.lineTo(cx+Math.cos(ba)*(rA+bandW*.6),cy+Math.sin(ba)*(rA+bandW*.6))
        ctx.strokeStyle='rgba(255,40,20,.4)';ctx.lineWidth=1.5;ctx.stroke()
    }

    // hour markers + labels
    for(let h=0;h<24;h++){
        const a=hToA(h),isMajor=h%6===0,isBurn=h===15||h===19
        const r1=R*1.02,r2=R*(isMajor?1.06:isBurn?1.05:1.04)
        ctx.beginPath()
        ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1)
        ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2)
        ctx.strokeStyle=isBurn?'rgba(255,40,20,.5)':isMajor?'rgba(255,248,231,.35)':'rgba(255,248,231,.1)'
        ctx.lineWidth=isMajor||isBurn?2:1;ctx.stroke()
        if(h%3===0){
            ctx.font=isMajor?'10px monospace':'8px monospace'
            ctx.textAlign='center';ctx.textBaseline='middle'
            ctx.fillStyle='rgba(220,20,60,.55)'
            ctx.fillText(String(h).padStart(2,'0'),cx+Math.cos(a)*R*1.12,cy+Math.sin(a)*R*1.12)
            const plH=(h+OFFSET)%24
            ctx.font='8px monospace';ctx.fillStyle='rgba(212,169,74,.5)'
            ctx.fillText(String(plH).padStart(2,'0'),cx+Math.cos(a)*R*.42,cy+Math.sin(a)*R*.42)
        }
    }

    // ring labels
    ctx.font='8px monospace';ctx.textAlign='center'
    ctx.fillStyle='rgba(220,20,60,.45)';ctx.fillText('THOMAS · ET',cx,cy-rA-bandW/2-8)
    ctx.fillStyle='rgba(212,169,74,.45)';ctx.fillText('ANETA · PL',cx,cy-rB-bandW/2-8)
    const isWkend=isWeekendDay(selectedDate.getFullYear(),selectedDate.getMonth(),selectedDate.getDate())
    ctx.fillStyle='rgba(68,255,170,.35)';ctx.fillText(isWkend?'WEEKEND':isFriday(selectedDate.getFullYear(),selectedDate.getMonth(),selectedDate.getDate())?'FRIDAY':'WEEKDAY',cx,cy-rOv-bandW*.3-6)

    // current time hands
    const now=new Date()
    const etFrac=(()=>{const d=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));return d.getHours()+d.getMinutes()/60+d.getSeconds()/3600})()
    const plFrac=(()=>{const d=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Warsaw'}));return d.getHours()+d.getMinutes()/60+d.getSeconds()/3600})()

    // only draw hands if viewing today
    const today=new Date()
    if(selectedDate.toDateString()===today.toDateString()){
        const aA=hToA(etFrac)
        ctx.beginPath();ctx.moveTo(cx+Math.cos(aA)*(rA-bandW),cy+Math.sin(aA)*(rA-bandW))
        ctx.lineTo(cx+Math.cos(aA)*(rA+bandW*.8),cy+Math.sin(aA)*(rA+bandW*.8))
        ctx.strokeStyle='rgba(220,20,60,.6)';ctx.lineWidth=2;ctx.stroke()
        ctx.beginPath();ctx.arc(cx+Math.cos(aA)*(rA+bandW),cy+Math.sin(aA)*(rA+bandW),3,0,TAU)
        ctx.fillStyle='#dc143c';ctx.fill()

        const plMapped=bToET(plFrac),bA=hToA(plMapped)
        ctx.beginPath();ctx.moveTo(cx+Math.cos(bA)*(rB-bandW),cy+Math.sin(bA)*(rB-bandW))
        ctx.lineTo(cx+Math.cos(bA)*(rB+bandW*.8),cy+Math.sin(bA)*(rB+bandW*.8))
        ctx.strokeStyle='rgba(212,169,74,.6)';ctx.lineWidth=2;ctx.stroke()
        ctx.beginPath();ctx.arc(cx+Math.cos(bA)*(rB+bandW),cy+Math.sin(bA)*(rB+bandW),3,0,TAU)
        ctx.fillStyle='#d4a94a';ctx.fill()
    }

    // center info
    ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.font='8px monospace';ctx.fillStyle='rgba(255,248,231,.08)'
    const ds=selectedDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    ctx.fillText(ds,cx,cy)

    // info bar
    const etStr=now.toLocaleTimeString('en-GB',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit'})
    const plStr=now.toLocaleTimeString('en-GB',{timeZone:'Europe/Warsaw',hour:'2-digit',minute:'2-digit',second:'2-digit'})
    document.getElementById('ta').textContent=etStr
    document.getElementById('tb').textContent=plStr

    const aType=getTypeAt(A.blocks,Math.floor(etFrac))
    const bType=getTypeAt(B.blocks,Math.floor(plFrac))
    const statusEl=document.getElementById('status')
    statusEl.innerHTML='<div class="hdr">STATUS NOW</div>'
    statusEl.innerHTML+=`<span style="color:#dc143c">${A.name}: ${aType.toUpperCase()}</span><br>`
    statusEl.innerHTML+=`<span style="color:#d4a94a">${B.name}: ${bType.toUpperCase()}</span><br>`
    if(aType==='free'&&bType==='free')statusEl.innerHTML+='<span style="color:#44ffaa">★ BOTH FREE</span>'
    else if(aType==='sleep'||bType==='sleep')statusEl.innerHTML+='<span style="color:rgba(255,60,60,.4)">● someone sleeping</span>'
    else statusEl.innerHTML+='<span style="color:rgba(255,200,60,.3)">● both awake</span>'

    // overlap windows
    const winsEl=document.getElementById('wins')
    let winHTML=''
    let inWin=false,winStart=0
    for(let h=0;h<25;h++){
        const aT=h<24?getTypeAt(A.blocks,h):'x'
        const bLH=(h+OFFSET)%24
        const bT=h<24?getTypeAt(B.blocks,bLH):'x'
        const both=aT==='free'&&bT==='free'
        if(both&&!inWin){inWin=true;winStart=h}
        if(!both&&inWin){
            const plS=(winStart+OFFSET)%24,plE=(h+OFFSET)%24
            winHTML+=`${String(winStart).padStart(2,'0')}-${String(h).padStart(2,'0')} ET = ${String(plS).padStart(2,'0')}-${String(plE).padStart(2,'0')} PL  `
            inWin=false
        }
    }
    winsEl.innerHTML=winHTML||'no overlap'
}

// ═══ CALENDAR PANEL ═══
function renderCalendar(){
    const calEl=document.getElementById('cal')
    const y=selectedDate.getFullYear(),m=selectedDate.getMonth()
    const today=new Date()
    const monthName=new Date(y,m).toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase()
    const firstDow=new Date(y,m,1).getDay()
    const offset=firstDow===0?6:firstDow-1
    const daysInMonth=new Date(y,m+1,0).getDate()

    let html=`<div class="mhdr">${monthName}</div><div class="grid">`
    const DOW=['M','T','W','T','F','S','S']
    DOW.forEach(d=>html+=`<div class="dhdr">${d}</div>`)
    for(let i=0;i<offset;i++)html+='<div class="day"></div>'
    for(let d=1;d<=daysInMonth;d++){
        const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()
        const isSel=d===selectedDate.getDate()&&m===selectedDate.getMonth()
        const hasFriEvent=isFriday(y,m,d)||ANETA_EVENTS[d]
        html+=`<div class="day${isToday?' today':''}${isSel?' selected':''}${hasFriEvent?' has-event':''}" onclick="selectDay(${d})">${d}</div>`
    }
    html+='</div>'

    // schedule for selected day
    html+='<div class="sched">'
    const{A,B}=getSchedules(selectedDate)
    const selDow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][selectedDate.getDay()]
    html+=`<div style="color:#dc143c;font-size:8px;letter-spacing:1px;margin-bottom:4px">${selDow} ${selectedDate.getDate()} — THOMAS ET</div>`
    A.blocks.forEach(b=>{
        html+=`<div class="ev ${b.type}">${String(b.s).padStart(2,'0')}-${String(b.e).padStart(2,'0')} ${b.type}</div>`
    })
    html+=`<div style="color:#d4a94a;font-size:8px;letter-spacing:1px;margin:6px 0 4px">ANETA PL</div>`
    B.blocks.forEach(b=>{
        html+=`<div class="ev ${b.type}">${String(Math.floor(b.s)).padStart(2,'0')}:${b.s%1?'30':'00'}-${String(Math.floor(b.e)).padStart(2,'0')}:${b.e%1?'30':'00'} ${b.type}${b.label?' — '+b.label:''}</div>`
    })
    html+='</div>'

    calEl.innerHTML=html
}

function selectDay(d){
    selectedDate=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),d)
    renderCalendar()
}
window.selectDay=selectDay

function loop(){requestAnimationFrame(loop);drawClock()}
renderCalendar()
loop()
</script>
</body></html>
