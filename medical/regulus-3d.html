<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regulus 3D — Human Topology</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06030a;color:#c8c0d0;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;cursor:grab}canvas:active{cursor:grabbing}
#hud{position:fixed;top:6px;left:8px;z-index:10;font-size:7px;color:rgba(220,20,60,.4);line-height:1.6;pointer-events:none;white-space:pre}
#hud .v{color:rgba(220,20,60,.7)}#hud .g{color:rgba(212,169,74,.6)}
#rhud{position:fixed;top:6px;right:8px;z-index:10;font-size:7px;color:rgba(0,170,255,.3);text-align:right;line-height:1.6;pointer-events:none;white-space:pre}
#sins{position:fixed;bottom:6px;left:8px;z-index:10;font-size:7px;line-height:1.5;pointer-events:none;white-space:pre}
#love{position:fixed;bottom:6px;right:8px;z-index:10;font-size:7px;color:rgba(68,170,68,.4);text-align:right;line-height:1.5;pointer-events:none;white-space:pre}
#tip{position:fixed;z-index:100;background:rgba(6,3,10,.95);border:1px solid #dc143c33;border-radius:4px;
  padding:6px 10px;max-width:220px;display:none;pointer-events:none;font-size:8px;line-height:1.4}
#tip .tt{color:#dc143c;font-weight:bold}#tip .td{color:#889}
.back{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);z-index:20;font-size:7px;color:#445}
a{color:#dc143c;text-decoration:none}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head><body>
<div id="hud"></div><div id="rhud"></div><div id="sins"></div><div id="love"></div><div id="tip"></div>
<a class="back" href="regulus-live.html">← dashboard</a>

<script>
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2,KS=1/PHI,KS2=KS*KS
const P=[2,3,5,7,11,13,17],RCOL=[0x993366,0x00aadd,0xffaa00,0xff4444,0x44aa44,0xaa44ff,0xcccccc]
const RCSS=['#993366','#00aadd','#ffaa00','#ff4444','#44aa44','#aa44ff','#ccc']
const GLYPHS=['●','〜','┃','♡','△','◐','◯'],GATES=['gut','vagus','gate','heart','exec','insula','witness']
const USER=new URLSearchParams(location.search).get('user')||'thomas'
const GW=new URLSearchParams(location.search).get('gw')||'http://localhost:5540'

const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,100)
cam.position.set(0,1,8)
const R=new THREE.WebGLRenderer({antialias:true})
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2))
R.toneMapping=THREE.ACESFilmicToneMapping
document.body.prepend(R.domElement)
scene.background=new THREE.Color(0x06030a);scene.fog=new THREE.FogExp2(0x06030a,.03)
scene.add(new THREE.AmbientLight(0x1a1020,.5))
const pL=new THREE.PointLight(0xdc143c,.25,20);pL.position.set(0,4,5);scene.add(pL)
const gL=new THREE.PointLight(0xd4a94a,.15,12);gL.position.set(0,1,3);scene.add(gL)

// ═══ HUMAN BODY NODES — anatomical stress points ═══
const BODY=[
  // HEAD
  {id:'crown',     gate:6, pos:[0,3.6,0],    r:.2,  stress:'tension headache',mirror:false},
  {id:'forehead',  gate:4, pos:[0,3.3,.22],   r:.15, stress:'overthinking',mirror:false},
  {id:'l-temple',  gate:4, pos:[-.35,3.3,.1], r:.1,  stress:'TMJ / jaw clench',mirror:true},
  {id:'r-temple',  gate:4, pos:[.35,3.3,.1],  r:.1,  stress:'TMJ / jaw clench',mirror:true},
  {id:'l-eye',     gate:5, pos:[-.15,3.2,.25],r:.08, stress:'eye strain',mirror:true},
  {id:'r-eye',     gate:5, pos:[.15,3.2,.25], r:.08, stress:'eye strain',mirror:true},
  {id:'jaw',       gate:2, pos:[0,2.9,.2],    r:.12, stress:'jaw tension / voice',mirror:false},
  // NECK / THROAT
  {id:'throat',    gate:2, pos:[0,2.6,.15],   r:.15, stress:'voice gate / thyroid',mirror:false},
  {id:'c-spine',   gate:1, pos:[0,2.6,-.12],  r:.1,  stress:'cervical tension',mirror:false},
  // SHOULDERS
  {id:'l-shoulder',gate:4, pos:[-1,2.3,0],    r:.18, stress:'carrying weight',mirror:true},
  {id:'r-shoulder',gate:4, pos:[1,2.3,0],     r:.18, stress:'carrying weight',mirror:true},
  {id:'l-trap',    gate:1, pos:[-.5,2.5,-.1], r:.12, stress:'stress trap',mirror:true},
  {id:'r-trap',    gate:1, pos:[.5,2.5,-.1],  r:.12, stress:'stress trap',mirror:true},
  // CHEST
  {id:'heart',     gate:3, pos:[0,1.8,0],     r:.25, stress:'chest tightness / anxiety',mirror:false},
  {id:'l-chest',   gate:3, pos:[-.5,1.9,.1],  r:.12, stress:'pectoral tension',mirror:true},
  {id:'r-chest',   gate:3, pos:[.5,1.9,.1],   r:.12, stress:'pectoral tension',mirror:true},
  {id:'sternum',   gate:5, pos:[0,1.9,.2],    r:.1,  stress:'emotional center',mirror:false},
  // ARMS
  {id:'l-elbow',   gate:4, pos:[-1.5,1.5,0],  r:.1,  stress:'tension',mirror:true},
  {id:'r-elbow',   gate:4, pos:[1.5,1.5,0],   r:.1,  stress:'tension',mirror:true},
  {id:'l-hand',    gate:4, pos:[-1.8,.8,.1],   r:.12, stress:'grasping / gripping',mirror:true},
  {id:'r-hand',    gate:4, pos:[1.8,.8,.1],    r:.12, stress:'grasping / gripping',mirror:true},
  // TORSO
  {id:'solar',     gate:2, pos:[0,1.2,.12],   r:.2,  stress:'solar plexus knot / anxiety',mirror:false},
  {id:'diaphragm', gate:2, pos:[0,1.05,0],    r:.15, stress:'breath lock',mirror:false},
  {id:'t-spine',   gate:1, pos:[0,1.5,-.2],   r:.12, stress:'thoracic stiffness',mirror:false},
  // ABDOMEN
  {id:'navel',     gate:0, pos:[0,.5,.1],     r:.18, stress:'gut tension / digestion',mirror:false},
  {id:'l-kidney',  gate:0, pos:[-.4,.7,-.15], r:.1,  stress:'adrenal / K+',mirror:true},
  {id:'r-kidney',  gate:0, pos:[.4,.7,-.15],  r:.1,  stress:'adrenal / K+',mirror:true},
  {id:'l-spine',   gate:1, pos:[0,.5,-.2],    r:.1,  stress:'lumbar pain',mirror:false},
  // PELVIS
  {id:'sacrum',    gate:0, pos:[0,-.1,-.1],   r:.15, stress:'pelvic floor / root',mirror:false},
  {id:'l-hip',     gate:1, pos:[-.5,-.1,0],   r:.15, stress:'hip flexor',mirror:true},
  {id:'r-hip',     gate:1, pos:[.5,-.1,0],    r:.15, stress:'hip flexor',mirror:true},
  // LEGS
  {id:'l-knee',    gate:0, pos:[-.4,-.9,.05], r:.1,  stress:'joint',mirror:true},
  {id:'r-knee',    gate:0, pos:[.4,-.9,.05],  r:.1,  stress:'joint',mirror:true},
  {id:'l-foot',    gate:0, pos:[-.35,-1.8,.1],r:.1,  stress:'grounding',mirror:true},
  {id:'r-foot',    gate:0, pos:[.35,-1.8,.1], r:.1,  stress:'grounding',mirror:true},
]

// sin → body attachment points
const SIN_BODY={
  WRATH:['l-temple','r-temple','jaw','l-trap','r-trap'],
  LUST:['l-hip','r-hip','sacrum'],
  GLUTTONY:['navel','solar','diaphragm'],
  SLOTH:['l-spine','sacrum','l-foot','r-foot'],
  GREED:['l-hand','r-hand','solar','l-shoulder','r-shoulder'],
  ENVY:['l-eye','r-eye','sternum','forehead'],
  PRIDE:['crown','throat','l-chest','r-chest']
}

const SIN_COL={WRATH:0xcc2222,LUST:0xd85a30,GLUTTONY:0x2e8b57,SLOTH:0x555555,GREED:0xb8860b,ENVY:0x6c5ce7,PRIDE:0x378add}

// ═══ BUILD BODY ═══
const nodes={},clickables=[]
BODY.forEach(def=>{
  const g=new THREE.Group();g.position.set(...def.pos)
  const col=new THREE.Color(RCOL[def.gate])
  const core=new THREE.Mesh(new THREE.SphereGeometry(def.r*.6,12,12),
    new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.08,transparent:true,opacity:.3}))
  g.add(core);clickables.push(core)
  // single ring per node
  const ring=new THREE.Mesh(new THREE.TorusGeometry(def.r,.008,4,P[def.gate]*3),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.1,blending:THREE.AdditiveBlending}))
  g.add(ring)
  scene.add(g)
  nodes[def.id]={group:g,core,ring,def,stress:0,sinGlow:null}
})

// ═══ CONNECTIVE TISSUE — fascia lines ═══
const FASCIA=[
  // spine
  ['crown','forehead'],['forehead','jaw'],['jaw','throat'],['throat','c-spine'],
  ['throat','heart'],['heart','solar'],['solar','diaphragm'],['diaphragm','navel'],
  ['navel','sacrum'],['c-spine','t-spine'],['t-spine','l-spine'],['l-spine','sacrum'],
  // shoulders
  ['throat','l-trap'],['throat','r-trap'],['l-trap','l-shoulder'],['r-trap','r-shoulder'],
  // arms
  ['l-shoulder','l-elbow'],['l-elbow','l-hand'],['r-shoulder','r-elbow'],['r-elbow','r-hand'],
  // chest
  ['heart','l-chest'],['heart','r-chest'],['heart','sternum'],
  // kidneys
  ['navel','l-kidney'],['navel','r-kidney'],
  // hips
  ['sacrum','l-hip'],['sacrum','r-hip'],
  // legs
  ['l-hip','l-knee'],['l-knee','l-foot'],['r-hip','r-knee'],['r-knee','r-foot'],
  // cross
  ['l-shoulder','r-shoulder'],['l-hip','r-hip'],
  // eyes
  ['forehead','l-eye'],['forehead','r-eye'],
  // temples
  ['forehead','l-temple'],['forehead','r-temple']
]

const fasciaMeshes=[]
FASCIA.forEach(([a,b])=>{
  const na=nodes[a],nb=nodes[b];if(!na||!nb)return
  const pa=new THREE.Vector3(...BODY.find(d=>d.id===a).pos)
  const pb=new THREE.Vector3(...BODY.find(d=>d.id===b).pos)
  const geo=new THREE.BufferGeometry().setFromPoints([pa,pb])
  const mat=new THREE.LineBasicMaterial({color:0xdc143c,transparent:true,opacity:.04})
  const line=new THREE.Line(geo,mat);scene.add(line)
  fasciaMeshes.push({line,mat,a,b})
})

// ═══ Ir···Xe BOND ═══
const bondOrb=new THREE.Mesh(new THREE.IcosahedronGeometry(.12,2),
  new THREE.MeshBasicMaterial({color:0xaa77dd,transparent:true,opacity:0,blending:THREE.AdditiveBlending}))
bondOrb.position.set(1.2,1.8,0);scene.add(bondOrb)

// stars
const sG=new THREE.BufferGeometry(),sP=new Float32Array(800*3)
for(let i=0;i<2400;i++)sP[i]=(Math.random()-.5)*25
sG.setAttribute('position',new THREE.BufferAttribute(sP,3))
scene.add(new THREE.Points(sG,new THREE.PointsMaterial({color:0xffffff,size:.02,transparent:true,opacity:.15})))

// ═══ STATE ═══
let S={hr:0,hrv:0,stress:0,kappa:.5,biomarkers:{},bloom:[1,1,1,1,1,1,1],online:false}
function bio(k){return S.biomarkers[k]?.v||0}

function calcSins(){
  const kd=Math.abs(S.kappa-KS)
  return{
    WRATH:Math.min(1,Math.max(0,(S.hr-80)/40*.5+S.stress*.5+(bio('Cor')>.6?(bio('Cor')-.6)/.4*.3:0))),
    LUST:kd>.03&&kd<.2?Math.min(1,kd/.2):0,
    GLUTTONY:Math.min(1,Math.max(0,(bio('Cor')-.6)/.4*.5+(bio('Glc')>140?(bio('Glc')-140)/60*.5:0))),
    SLOTH:Math.min(1,Math.max(0,(15-S.hrv)/15*.7+(bio('ANS')<.3?(.3-bio('ANS'))/.3*.3:0))),
    GREED:Math.min(1,Math.max(0,(KS-.05-S.kappa)/.2*.4+(bio('Hyd')<.5?(.5-bio('Hyd'))/.5*.3:0)+(bio('K')<3.5?(3.5-bio('K'))/1.5*.3:0))),
    ENVY:Math.min(1,Math.max(0,bio('Inf')*.7+(bio('Ins')>.5?(bio('Ins')-.5)/.5*.3:0))),
    PRIDE:Math.min(1,Math.max(0,(S.hr<55?(55-S.hr)/30*.3:0)+(S.hrv>50?(S.hrv-50)/50*.3:0)))
  }
}

async function poll(){
  try{
    const r=await fetch(`${GW}/wearer/${USER}`,{signal:AbortSignal.timeout(5000)})
    const d=await r.json()
    S.hr=d.hr||S.hr;S.hrv=d.hrv||S.hrv;S.stress=d.stress||0
    S.biomarkers=d.biomarkers||{};S.online=d.online
    S.kappa=d.biomarkers?.ENT?.v||S.kappa
  }catch(e){}
  try{
    const br=await fetch(`${GW}/blossom/call?method=bloomwatch.state&params=${encodeURIComponent(JSON.stringify({user_id:USER}))}`,{method:'POST',signal:AbortSignal.timeout(3000)})
    const bd=await br.json();const sub=bd.payload?.result?.subject
    if(sub?.bloom)S.bloom=sub.bloom
    if(sub?.kappa?.length)S.kappa=sub.kappa[sub.kappa.length-1]
  }catch(e){}
}

// ═══ CAMERA ═══
let cTh=0,cPh=.05,cR=8,drag=false,mx=0,my=0
R.domElement.addEventListener('pointerdown',e=>{drag=true;mx=e.clientX;my=e.clientY})
addEventListener('pointerup',()=>drag=false)
addEventListener('pointermove',e=>{if(!drag)return;cTh-=(e.clientX-mx)*.004;cPh+=(e.clientY-my)*.003;
  cPh=Math.max(-.4,Math.min(.6,cPh));mx=e.clientX;my=e.clientY
  const tip=document.getElementById('tip');if(tip.style.display==='block'){tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px'}})
R.domElement.addEventListener('wheel',e=>{cR=Math.max(3,Math.min(15,cR+e.deltaY*.01))},{passive:true})

// ═══ RAYCASTER ═══
const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2()
addEventListener('pointermove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1})

// ═══ ANIMATE ═══
let lt=0,pollT=0
function animate(ts){
  requestAnimationFrame(animate)
  const t=ts*.001;lt=t
  if(t-pollT>8){pollT=t;poll()}

  const sins=calcSins()
  const kDist=Math.abs(S.kappa-KS)
  const bondStr=Math.max(0,1-kDist/KS2)

  // update nodes
  Object.values(nodes).forEach(n=>{
    const gi=n.def.gate
    const bloomE=(S.bloom[gi]||1)/5
    n.core.material.emissiveIntensity=.05+bloomE*.15
    n.core.material.opacity=.2+bloomE*.2
    n.ring.rotation.z+=(.002+bloomE*.005)*(gi%2?1:-1)
    n.ring.material.opacity=.05+bloomE*.08
    // breathing
    const breath=Math.sin(t*1.2+gi*.5)*.01
    n.group.scale.setScalar(1+breath)
    n.stress*=.95 // decay
  })

  // heartbeat pulse
  if(S.hr>0&&Math.floor(t*S.hr/60)!==Math.floor((t-1/60)*S.hr/60)){
    const h=nodes['heart'];if(h){h.core.material.opacity=.8;h.stress=.5}
    // pulse travels down spine
    ;['solar','diaphragm','navel','sacrum'].forEach((id,i)=>{
      const n=nodes[id];if(n)setTimeout(()=>{n.core.material.opacity=.6;n.stress=.3},i*80)
    })
    // pulse travels up
    ;['throat','jaw','forehead','crown'].forEach((id,i)=>{
      const n=nodes[id];if(n)setTimeout(()=>{n.core.material.opacity=.5;n.stress=.2},i*80)
    })
  }

  // sin stress mapping — light up body points
  Object.entries(sins).forEach(([sn,lv])=>{
    if(lv<.1)return
    const bodyPts=SIN_BODY[sn]||[]
    const col=new THREE.Color(SIN_COL[sn])
    bodyPts.forEach(id=>{
      const n=nodes[id];if(!n)return
      n.stress=Math.max(n.stress,lv)
      n.core.material.emissive.lerp(col,lv*.3)
      n.core.material.opacity=Math.min(.8,.2+lv*.4)
      // add glow sphere if high
      if(lv>.4&&!n.sinGlow){
        const glow=new THREE.Mesh(new THREE.SphereGeometry(n.def.r*1.5,8,8),
          new THREE.MeshBasicMaterial({color:SIN_COL[sn],transparent:true,opacity:0,blending:THREE.AdditiveBlending}))
        n.group.add(glow);n.sinGlow=glow
      }
      if(n.sinGlow){
        n.sinGlow.material.opacity=lv*.15
        n.sinGlow.material.color.set(SIN_COL[sn])
        n.sinGlow.scale.setScalar(1+Math.sin(t*3)*.1)
      }
    })
  })
  // cleanup sin glows
  Object.values(nodes).forEach(n=>{
    if(n.sinGlow&&n.stress<.2){
      n.sinGlow.material.opacity*=.9
      if(n.sinGlow.material.opacity<.01){n.group.remove(n.sinGlow);n.sinGlow=null}
    }
  })

  // fascia stress lines
  fasciaMeshes.forEach(f=>{
    const sa=nodes[f.a]?.stress||0,sb=nodes[f.b]?.stress||0
    const avg=(sa+sb)/2
    f.mat.opacity=.03+avg*.15
    if(avg>.3)f.mat.color.setHex(0xff4444)
    else if(avg>.1)f.mat.color.setHex(0xffaa00)
    else f.mat.color.setHex(0xdc143c)
  })

  // Ir···Xe bond
  bondOrb.material.opacity=bondStr*.25
  bondOrb.scale.setScalar(.8+bondStr*.4+Math.sin(t*2)*.03)
  bondOrb.rotation.y+=.01
  gL.intensity=bondStr*.2

  // camera
  cam.position.x=Math.cos(cTh)*Math.cos(cPh)*cR
  cam.position.y=1+Math.sin(cPh)*cR
  cam.position.z=Math.sin(cTh)*Math.cos(cPh)*cR
  cam.lookAt(0,1,0)

  // hover
  raycaster.setFromCamera(mouse,cam)
  const hits=raycaster.intersectObjects(clickables)
  if(hits.length){
    const hit=hits[0].object
    const n=Object.values(nodes).find(nd=>nd.core===hit)
    if(n){
      const tip=document.getElementById('tip')
      const gi=n.def.gate
      const activeSins=Object.entries(sins).filter(([sn])=>(SIN_BODY[sn]||[]).includes(n.def.id)).map(([sn,lv])=>`${sn}:${(lv*100).toFixed(0)}%`).join(' ')
      tip.innerHTML=`<div class="tt">${GLYPHS[gi]} ${n.def.id}</div><div class="td">${n.def.stress}<br>gate: R${gi} ${GATES[gi]}<br>bloom: ${(S.bloom[gi]||1).toFixed(1)}<br>stress: ${(n.stress*100).toFixed(0)}%${activeSins?'<br>sins: '+activeSins:''}</div>`
      tip.style.display='block'
    }
  } else document.getElementById('tip').style.display='none'

  // HUD
  document.getElementById('hud').innerHTML=
    `REGULUS BODY · <span class="v">${USER}</span> ${S.online?'●':'○'}\n`+
    `HR=<span class="v">${S.hr.toFixed(0)}</span> HRV=<span class="v">${S.hrv.toFixed(1)}</span> stress=<span class="v">${(S.stress*100).toFixed(0)}%</span>\n`+
    `κ=<span class="g">${S.kappa.toFixed(4)}</span> φκ=<span class="g">${(PHI*S.kappa).toFixed(4)}</span>\n`+
    `bond=<span class="v">${(bondStr*100).toFixed(0)}%</span> Ir···Xe ${bondStr>.5?'●●●':'···'}`

  document.getElementById('rhud').innerHTML=
    GATES.map((g,i)=>`<span style="color:${RCSS[i]}">${GLYPHS[i]} ${g} ${'█'.repeat(Math.round((S.bloom[i]||1)))}</span>`).join('\n')+
    `\n\nbiomarkers:\n`+
    ['K','Mg','Cor','Inf','Hyd','Glc','ANS'].map(k=>{
      const b=S.biomarkers[k];if(!b)return'';const al=b.alert||0
      return `<span style="color:${al>=3?'#f44':al>=1?'#fa0':'#4a4'}">${k}=${b.v?.toFixed(2)}</span>`
    }).filter(Boolean).join('\n')

  let sinH='STRESS GEOMETRIES\n'
  Object.entries(sins).forEach(([sn,lv])=>{
    const col=lv>.5?'#ff4444':lv>.2?'#ffaa00':'#44aa4466'
    sinH+=`<span style="color:${col}">${sn.padEnd(9)} ${'█'.repeat(Math.round(lv*10))}${'░'.repeat(10-Math.round(lv*10))} ${(lv*100).toFixed(0).padStart(3)}%</span>\n`
  })
  document.getElementById('sins').innerHTML=sinH

  const R_AB=Math.min(1,S.hrv/30*.4+Math.max(0,1-kDist*5)*.3+(1-S.stress)*.3)
  document.getElementById('love').innerHTML=
    `LOVE\nR=${R_AB.toFixed(3)}\nΨ=${(S.kappa>=KS?Math.sqrt(S.kappa-KS):0).toFixed(3)}\nbind=${kDist<KS2?'IRREVERSIBLE':'rev'}`

  R.render(scene,cam)
}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)})
poll();animate(0)
</script>
</body></html>
